<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMW - Craft Station Renewal Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0b0b0f;
  --bg-secondary: #101015;
  --bg-tertiary: #161620;
  --bg-card: #0e0e14;
  --bg-panel: #0d0d12;
  --gold: #D4A843;
  --gold-bright: #F0C850;
  --gold-dim: #8B7230;
  --gold-glow: rgba(212, 168, 67, 0.3);
  --gold-glow-strong: rgba(212, 168, 67, 0.6);
  --border-default: #1e1e28;
  --border-hover: #2e2e3a;
  --text-primary: #d8d8de;
  --text-secondary: #78788a;
  --text-dim: #454560;
  --tab-active: #c8b07a;
  --toast-success: rgba(34, 197, 94, 0.12);
  --toast-error: rgba(239, 68, 68, 0.12);
  --toast-info: rgba(59, 130, 246, 0.12);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

/* ─── Animations ──────────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popupIn { from { opacity: 0; transform: scale(0.88) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes toastIn { from { opacity: 0; transform: translateX(120px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(120px); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes unlockPulse {
  0% { box-shadow: 0 0 0 0 var(--gold-glow-strong); }
  70% { box-shadow: 0 0 0 20px rgba(212,168,67,0); }
  100% { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
}
@keyframes unlockGlow {
  0% { filter: brightness(1) saturate(0.3); opacity: 0.5; }
  50% { filter: brightness(1.4) saturate(1.2); opacity: 1; }
  100% { filter: brightness(1) saturate(1); opacity: 1; }
}
@keyframes craftComplete {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes craftHammer {
  0% { transform: rotate(0deg) scale(1); }
  15% { transform: rotate(-30deg) scale(1.1); }
  30% { transform: rotate(15deg) scale(0.95); }
  45% { transform: rotate(-20deg) scale(1.05); }
  60% { transform: rotate(10deg) scale(0.98); }
  75% { transform: rotate(-5deg) scale(1); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes tabUpgradeGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; filter: drop-shadow(0 0 3px rgba(34,197,94,0.6)); }
}
@keyframes craftSpark {
  0% { transform: translate(0,0) scale(1.5); opacity: 1; }
  60% { opacity: 0.7; }
  100% { transform: translate(var(--sx, 40px), var(--sy, 0px)) scale(0); opacity: 0; }
}
@keyframes craftFlash {
  0% { opacity: 0.7; }
  100% { opacity: 0; }
}
@keyframes craftProgress {
  0% { width: 0%; }
  100% { width: 100%; }
}
@keyframes craftBurst {
  0% { transform: scale(0); opacity: 0.8; }
  50% { opacity: 0.4; }
  100% { transform: scale(3); opacity: 0; }
}
@keyframes craftIconPop {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.2); filter: brightness(1.6); }
  100% { transform: scale(1); filter: brightness(1); }
}
@keyframes bpRegisterGlow {
  0% { box-shadow: 0 0 0 0 rgba(212,168,67,0.6); }
  50% { box-shadow: 0 0 20px 4px rgba(212,168,67,0.4); }
  100% { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
}
@keyframes bpRegisterFlash {
  0% { opacity: 0; }
  30% { opacity: 0.6; }
  100% { opacity: 0; }
}
@keyframes bpRegisterIcon {
  0% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.3) rotate(-10deg); }
  50% { transform: scale(0.9) rotate(5deg); }
  75% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes bpCheckPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.4); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes progressFill {
  from { width: 0; }
}
@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ─── Unlock Cinematic ───────────────────────────────────────── */
@keyframes lockShake {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
  10% { transform: translate(-50%, -50%) translate(-3px, 0) rotate(-2deg); }
  20% { transform: translate(-50%, -50%) translate(3px, 0) rotate(2deg); }
  30% { transform: translate(-50%, -50%) translate(-4px, 0) rotate(-3deg); }
  40% { transform: translate(-50%, -50%) translate(4px, 0) rotate(3deg); }
  50% { transform: translate(-50%, -50%) translate(-5px, 0) rotate(-4deg); }
  60% { transform: translate(-50%, -50%) translate(5px, 0) rotate(4deg); }
  70% { transform: translate(-50%, -50%) translate(-6px, 0) rotate(-5deg); }
  80% { transform: translate(-50%, -50%) translate(6px, 0) rotate(5deg); }
  90% { transform: translate(-50%, -50%) translate(-3px, 0) rotate(-2deg); }
}
@keyframes lockCrack {
  0% { opacity: 0; clip-path: inset(0 100% 0 0); }
  100% { opacity: 1; clip-path: inset(0 0 0 0); }
}
@keyframes shardFly {
  0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) rotate(var(--sr)) scale(0.3); }
}
@keyframes burstRing {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; border-width: 3px; }
  60% { opacity: 0.4; border-width: 1px; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; border-width: 0.5px; }
}
@keyframes burstFlash {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
  50% { opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}
@keyframes iconReveal {
  0% { transform: scale(0.3); opacity: 0; filter: brightness(3) saturate(0); }
  40% { transform: scale(1.2); opacity: 1; filter: brightness(2) saturate(0.5); }
  70% { transform: scale(0.95); filter: brightness(1.3) saturate(1); }
  100% { transform: scale(1); opacity: 1; filter: brightness(1) saturate(1); }
}
@keyframes iconGlow {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(212,168,67,0.6)); }
  50% { filter: drop-shadow(0 0 40px rgba(212,168,67,0.9)) drop-shadow(0 0 80px rgba(212,168,67,0.3)); }
}
@keyframes textReveal {
  0% { opacity: 0; transform: translateY(20px); letter-spacing: 12px; }
  60% { opacity: 1; letter-spacing: 6px; }
  100% { opacity: 1; transform: translateY(0); letter-spacing: 4px; }
}
@keyframes subtextFade {
  0%, 40% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes sparkle {
  0% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  50% { opacity: 1; transform: translate(calc(var(--dx) * 0.5), calc(var(--dy) * 0.5)) scale(1); }
  100% { opacity: 0; transform: translate(0px, 0px) scale(0); }
}
@keyframes cinematicFadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* ─── LevelUp Cinematic ─────────────────────────────────────── */
@keyframes lvlNumberPop {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.4); opacity: 1; }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes lvlArrowSlide {
  0% { opacity: 0; transform: translateX(-20px); }
  100% { opacity: 1; transform: translateX(0); }
}
@keyframes lvlRingExpand {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0.7; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}
@keyframes lvlStarBurst {
  0% { opacity: 0; transform: translate(0,0) scale(0) rotate(0deg); }
  30% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(90deg); }
  100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(0) rotate(180deg); }
}
@keyframes lvlRarityReveal {
  0% { opacity: 0; transform: translateY(10px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes lvlBgPulse {
  0% { background: rgba(212,168,67,0.08); }
  50% { background: rgba(212,168,67,0.15); }
  100% { background: rgba(212,168,67,0.08); }
}

/* ─── Scrollbar ──────────────────────────────────────────────── */
.scroll-area::-webkit-scrollbar { width: 5px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }
.scroll-area::-webkit-scrollbar-thumb { background: #222230; border-radius: 3px; }
.scroll-area::-webkit-scrollbar-thumb:hover { background: #333345; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ─── Constants ──────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'play', name: '플레이' }, { id: 'character', name: '캐릭터' },
  { id: 'storage', name: '창고' }, { id: 'vendor', name: '벤더' },
  { id: 'craft', name: '제작대' }, { id: 'rank', name: '랭킹' },
  { id: 'trade', name: '거래' }, { id: 'customize', name: '커스텀' },

const RARITY_ORDER = ['junk', 'common', 'uncommon', 'rare', 'epic', 'legendary'];
const RARITY_INFO = {
  junk:      { color: '#6B6B6B', label: '쓰레기', bg: 'rgba(107,107,107,0.08)', border: 'rgba(107,107,107,0.3)', selBg: '#1E1E1E' },
  common:    { color: '#B0B0B0', label: '일반',   bg: 'rgba(176,176,176,0.08)', border: 'rgba(176,176,176,0.3)', selBg: '#28282E' },
  uncommon:  { color: '#5ECC47', label: '고급',   bg: 'rgba(94,204,71,0.08)',   border: 'rgba(94,204,71,0.3)',   selBg: '#1E2E1E' },
  rare:      { color: '#4D9BFF', label: '희귀',   bg: 'rgba(77,155,255,0.08)',  border: 'rgba(77,155,255,0.3)',  selBg: '#1E2540' },
  epic:      { color: '#C266FF', label: '영웅',   bg: 'rgba(194,102,255,0.08)', border: 'rgba(194,102,255,0.3)', selBg: '#2A1E3A' },
  legendary: { color: '#FFB833', label: '전설',   bg: 'rgba(255,184,51,0.08)',  border: 'rgba(255,184,51,0.3)',  selBg: '#2E2518' },
};

// 레벨별 제작 가능 최대 등급 (ItemRarity)
// 해당 등급 이하는 모두 제작 가능
const LEVEL_RARITY = {
  1: 'common',
  2: 'uncommon',
  3: 'rare',
  4: 'epic',
  5: 'legendary',
};

const MAX_LEVEL = 5;
function formatLevel(level) { return level >= MAX_LEVEL ? 'Lv.Max' : `Lv.${level}`; }

// 등급별 재료 필요량 배율
const GRADE_MULTIPLIER = { junk: 0.5, common: 1, uncommon: 1.5, rare: 2.5, epic: 4, legendary: 6 };
// 등급별 스탯 배율
const STAT_MULTIPLIER = { junk: 0.6, common: 1, uncommon: 1.4, rare: 2, epic: 2.8, legendary: 3.5 };
// 등급별 랜덤 옵션 수 (J,C=0 / U=1 / R=2 / E=3 / L=4)
const GRADE_SUBSTATS = { junk: 0, common: 0, uncommon: 1, rare: 2, epic: 3, legendary: 4 };

// 카테고리별 랜덤 옵션 풀 (아이템이 가질 수 있는 추가 옵션 범위)
const RANDOM_OPTION_POOL = {
  weapon_melee: [
    { name: '근거리 피해', range: '5.2% ~ 10.0%' },
    { name: '근거리 추가 공격력', range: '1 ~ 3' },
    { name: '방어구 관통력', range: '10 ~ 20' },
    { name: '방어구 관통율', range: '2.6% ~ 5.0%' },
    { name: '헤드샷 피해', range: '3.2% ~ 6.2%' },
    { name: '이동 속도', range: '2 ~ 5' },
    { name: '이동 속도 증가율', range: '0.6% ~ 1.2%' },
    { name: '좀비에게 주는 추가 피해', range: '1 ~ 3' },
    { name: '기술 지속 시간', range: '6.5% ~ 12.5%' },
    { name: '공격 속도', range: '2.0% ~ 4.0%' },
  ],
  weapon_ranged: [
    { name: '원거리 피해', range: '4.8% ~ 9.5%' },
    { name: '원거리 추가 공격력', range: '1 ~ 3' },
    { name: '정확도', range: '3.0% ~ 6.0%' },
    { name: '헤드샷 피해', range: '4.0% ~ 8.0%' },
    { name: '재장전 속도', range: '3.0% ~ 6.0%' },
    { name: '방어구 관통율', range: '2.0% ~ 4.5%' },
    { name: '사거리', range: '2.0% ~ 5.0%' },
    { name: '좀비에게 주는 추가 피해', range: '1 ~ 3' },
    { name: '이동 속도', range: '1 ~ 3' },
    { name: '크리티컬 확률', range: '1.5% ~ 3.0%' },
  ],
  armor: [
    { name: '체력', range: '5 ~ 20' },
    { name: '이동 속도', range: '1 ~ 5' },
    { name: '이동 속도 증가율', range: '0.5% ~ 1.5%' },
    { name: '스태미나', range: '3 ~ 12' },
    { name: '피해 감소', range: '1.0% ~ 3.0%' },
    { name: '폭발 피해 감소', range: '2.0% ~ 5.0%' },
    { name: '크리티컬 저항', range: '1.5% ~ 3.5%' },
    { name: '넉다운 저항', range: '2.0% ~ 4.0%' },
    { name: '회피율', range: '0.5% ~ 2.0%' },
    { name: '체력 재생', range: '0.5 ~ 2.0' },
  ],
  consumable: [
    { name: '효과 지속 시간', range: '5.0% ~ 15.0%' },
    { name: '효과 강화', range: '3.0% ~ 8.0%' },
    { name: '쿨다운 감소', range: '2.0% ~ 5.0%' },
  ],
  utility: [
    { name: '범위 증가', range: '5.0% ~ 15.0%' },
    { name: '지속 시간', range: '0.5 ~ 2.0초' },
    { name: '효과 강화', range: '3.0% ~ 8.0%' },
  ],
};

function getOptionPoolForItem(item, stationId) {
  // station 2 = 무기 제작대
  if (stationId === 2) {
    if (item.category === '근접 무기' || item.category === '투척 무기') return RANDOM_OPTION_POOL.weapon_melee;
    return RANDOM_OPTION_POOL.weapon_ranged;
  }
  // station 3 = 방어구 제작대
  if (stationId === 3) return RANDOM_OPTION_POOL.armor;
  // station 1 = 회복 제작대
  if (stationId === 1) return RANDOM_OPTION_POOL.consumable;
  // station 4 = 유틸리티
  if (stationId === 4) return RANDOM_OPTION_POOL.utility;
  return RANDOM_OPTION_POOL.consumable;
}

// 스탯 문자열의 숫자를 배율로 스케일링
function scaleStatString(statStr, grade) {
  const mult = STAT_MULTIPLIER[grade] || 1;
  return statStr.replace(/(\d+)/g, (m) => Math.round(parseInt(m) * mult));
}

// ─── Station Data ──────────────────────────────────────────────
const INITIAL_STATIONS = [
  { id: 1, name: '회복 제작대', icon: '💊', defaultUnlocked: true, level: 1 },
  { id: 2, name: '무기 제작대', icon: '⚔️', defaultUnlocked: false, level: 0 },
  { id: 3, name: '방어구 제작대', icon: '🛡️', defaultUnlocked: false, level: 3 },
  { id: 4, name: '유틸리티 제작대', icon: '🔧', defaultUnlocked: false, level: 0 },
  { id: 5, name: '재료 제작대', icon: '🧪', defaultUnlocked: false, level: 0 },
  { id: 6, name: '특수 제작대', icon: '⚗️', defaultUnlocked: false, level: 0 },
];

  2: [{ name: '철 주괴', need: 20, have: 50, icon: '🔩', grade: 'common' }, { name: '목재', need: 15, have: 40, icon: '🪵', grade: 'common' }],
  3: [{ name: '가죽', need: 15, have: 30, icon: '🧶', grade: 'common' }, { name: '철 주괴', need: 10, have: 50, icon: '🔩', grade: 'common' }],
  4: [{ name: '화약', need: 10, have: 25, icon: '💥', grade: 'uncommon' }, { name: '기계 부품', need: 8, have: 20, icon: '⚙️', grade: 'common' }],
  5: [{ name: '원석', need: 25, have: 50, icon: '💎', grade: 'common' }, { name: '용광로 부품', need: 5, have: 15, icon: '🔥', grade: 'uncommon' }],
  6: [{ name: '이터널 코어', need: 50, have: 3, icon: '🌀', grade: 'legendary' }, { name: '차원 결정', need: 30, have: 1, icon: '💠', grade: 'epic' }, { name: '태초의 파편', need: 10, have: 0, icon: '✨', grade: 'legendary' }],
};

const LEVELUP_REQUIREMENTS = {
  // 회복 제작대 (1~5)
  '1_2': [{ name: '의료 부품', need: 10, have: 20, icon: '🔩', grade: 'uncommon' }, { name: '정제 용액', need: 5, have: 12, icon: '🧪', grade: 'uncommon' }],
  '1_3': [{ name: '의료 부품', need: 20, have: 30, icon: '🔩', grade: 'uncommon' }, { name: '정밀 도구', need: 8, have: 15, icon: '🔬', grade: 'rare' }],
  '1_4': [{ name: '정밀 도구', need: 15, have: 25, icon: '🔬', grade: 'rare' }, { name: '희귀 약재', need: 10, have: 18, icon: '🌿', grade: 'rare' }],
  '1_5': [{ name: '희귀 약재', need: 20, have: 30, icon: '🌿', grade: 'rare' }, { name: '나노 캡슐', need: 5, have: 10, icon: '💊', grade: 'epic' }],
  // 무기 제작대 (2~5)
  '2_2': [{ name: '강화 철 주괴', need: 15, have: 30, icon: '🔩', grade: 'uncommon' }, { name: '단단한 목재', need: 10, have: 25, icon: '🪵', grade: 'uncommon' }],
  '2_3': [{ name: '강화 철 주괴', need: 25, have: 40, icon: '🔩', grade: 'uncommon' }, { name: '정밀 부품', need: 12, have: 20, icon: '⚙️', grade: 'rare' }],
  '2_4': [{ name: '정밀 부품', need: 20, have: 30, icon: '⚙️', grade: 'rare' }, { name: '미스릴 원석', need: 8, have: 15, icon: '💎', grade: 'rare' }],
  '2_5': [{ name: '미스릴 원석', need: 15, have: 25, icon: '💎', grade: 'rare' }, { name: '용의 심장', need: 3, have: 5, icon: '❤️‍🔥', grade: 'epic' }],
  // 방어구 제작대 (3~5)

// ─── Helper Functions ─────────────────────────────────────────
function isRarityInRange(rarity, level) {
  if (!level || level < 1) return false;
  const maxRarity = LEVEL_RARITY[level];
  if (!maxRarity) return false;
  return RARITY_ORDER.indexOf(rarity) <= RARITY_ORDER.indexOf(maxRarity);
}

// 해당 아이템의 최저 등급이 제작 가능해지는 최소 제작대 레벨
function getRequiredLevel(item) {
  const lowestGrade = item.availableGrades ? item.availableGrades[0] : item.grade;
  for (let lv = 1; lv <= MAX_LEVEL; lv++) {
    if (isRarityInRange(lowestGrade, lv)) return lv;
  }
  return MAX_LEVEL;
}

// 해당 레벨의 최대 제작 등급 라벨 반환
function getMaxRarityLabel(level) {
  if (!level || level < 1) return null;
  const maxRarity = LEVEL_RARITY[level];
  if (!maxRarity) return null;
  return RARITY_INFO[maxRarity].label;
}

// 해당 레벨의 최대 제작 등급 키 반환
function getMaxRarityKey(level) {
  if (!level || level < 1) return null;
  return LEVEL_RARITY[level] || null;
}

function canCraft(materials) {
  return materials.every(m => m.have >= m.need);
}

// Find if a material is craftable in any station (by name match)
// stations 전달 시 해당 제작대 레벨에서 실제로 보이는 아이템만 반환
function findCraftableItem(materialName, stations) {
  for (const [sid, stationData] of Object.entries(CRAFT_ITEMS)) {
    for (const cat of stationData.categories) {
      const item = cat.items.find(it => it.name === materialName);
      if (item) {
        // stations가 주어지면 레벨 범위 체크
        if (stations) {
          const station = stations.find(s => s.id === parseInt(sid));
          if (!station || !isRarityInRange(item.grade, station.level)) continue;
        }
        return { stationId: parseInt(sid), item };
      }
    }
  }
  return null;
}

// ─── Modal Overlay ────────────────────────────────────────────
function Modal({ open, onClose, title, children, width, bodyStyle }) {
  // ESC 키로 팝업 닫기
  useEffect(() => {
    if (!open) return;
    const handleEsc = (e) => {
      if (e.key === 'Escape') { e.stopPropagation(); e.preventDefault(); onClose(); }
    };
    window.addEventListener('keydown', handleEsc, true); // capture phase로 뒤로가기보다 먼저 잡음
    return () => window.removeEventListener('keydown', handleEsc, true);
  }, [open, onClose]);

  if (!open) return null;
  return React.createElement('div', {
    style: {
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 500,
      display: 'flex', alignItems: 'center', justifyContent: 'center',

// ═══════════════════════════════════════════════════════════════
// Unlock Cinematic (full-screen dramatic animation)
// ═══════════════════════════════════════════════════════════════
function UnlockCinematic({ station, onComplete }) {
  const [phase, setPhase] = useState(0);
  // 0: lock shaking (0~800ms)
  // 1: shatter + burst (800~1800ms)
  // 2: icon reveal + text (1800~3200ms)
  // 3: fade out (3200~4000ms)

  useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 800);
    const t2 = setTimeout(() => setPhase(2), 1600);
    const t3 = setTimeout(() => setPhase(3), 3400);
    const t4 = setTimeout(() => onComplete(), 4200);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
  }, []);

  // Generate shard data once
  const shards = useMemo(() => {
    const pieces = [];
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const dist = 120 + Math.random() * 200;
      pieces.push({
        sx: Math.cos(angle) * dist,
        sy: Math.sin(angle) * dist,
        sr: (Math.random() - 0.5) * 720,
        size: 8 + Math.random() * 16,
        delay: Math.random() * 0.15,
        shape: Math.random() > 0.5 ? 'polygon(15% 0%, 100% 20%, 85% 100%, 0% 80%)' : 'polygon(0% 15%, 80% 0%, 100% 85%, 20% 100%)',
      });
    }
    return pieces;
  }, []);

  // Sparkle particles
  const sparkles = useMemo(() => {
    const pts = [];
    for (let i = 0; i < 20; i++) {
      const angle = (i / 20) * Math.PI * 2;
      const dist = 60 + Math.random() * 120;
      pts.push({
        dx: Math.cos(angle) * dist,
        dy: Math.sin(angle) * dist,
        delay: Math.random() * 0.6,
        size: 2 + Math.random() * 4,
      });
    }
    return pts;
  }, []);

  const el = React.createElement;

  return el('div', {
    style: {
      position: 'fixed', inset: 0, zIndex: 2000,
      background: 'rgba(0, 0, 0, 0.92)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      animation: phase === 3 ? 'cinematicFadeOut 0.8s ease forwards' : 'fadeIn 0.3s ease',
    }
  },

    // === Phase 0: Lock icon shaking ===
    phase === 0 && el('div', {
      style: {
        position: 'absolute', top: '50%', left: '50%',
        animation: 'lockShake 0.8s ease-in-out',
        fontSize: 72, lineHeight: 1,
      }
    }, '🔒'),

    // === Phase 0: Crack lines overlay ===
    phase === 0 && el('div', {
      style: {
        position: 'absolute', top: '50%', left: '50%',
        transform: 'translate(-50%, -50%)',
        width: 100, height: 100,
      }
    },
      // Crack lines (SVG-like with divs)
      ...[0, 60, 120, 180, 240, 300].map((angle, i) =>
        el('div', {
          key: `crack-${i}`,
          style: {
            position: 'absolute', top: '50%', left: '50%',
            width: 2, height: 0, background: 'var(--gold-bright)',
            transformOrigin: '0 0',
            transform: `rotate(${angle}deg)`,
            animation: `lockCrack 0.6s ease ${0.3 + i * 0.05}s forwards`,
            boxShadow: '0 0 8px var(--gold)',
          }
        })
      )
    ),

    // === Phase 1: Shards flying out ===
    phase >= 1 && phase < 3 && el('div', {
      style: {
        position: 'absolute', top: '50%', left: '50%',
        width: 0, height: 0,
      }
    },
      ...shards.map((shard, i) =>
        el('div', {
          key: `shard-${i}`,
          style: {
            position: 'absolute',
            width: shard.size, height: shard.size,
            background: i % 3 === 0
              ? 'linear-gradient(135deg, var(--gold-bright), var(--gold-dim))'
              : i % 3 === 1
                ? 'linear-gradient(135deg, #555, #333)'

            animation: `shardFly 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${shard.delay}s forwards`,
            boxShadow: i % 3 === 0 ? '0 0 6px var(--gold-glow)' : 'none',
          }
        })
      )
    ),

    // === Phase 1: Burst rings ===
    phase >= 1 && phase < 3 && el(React.Fragment, null,
      el('div', {
        style: {
          position: 'absolute', top: '50%', left: '50%',
          width: 300, height: 300, borderRadius: '50%',
          border: '2px solid var(--gold)',
          animation: 'burstRing 0.7s ease-out forwards',

      }),
      el('div', {
        style: {
          position: 'absolute', top: '50%', left: '50%',
          width: 500, height: 500, borderRadius: '50%',
          border: '1px solid rgba(212,168,67,0.4)',

        }
      }),
      // Central flash
      el('div', {
        style: {
          position: 'absolute', top: '50%', left: '50%',
          width: 200, height: 200, borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(212,168,67,0.6) 0%, rgba(212,168,67,0) 70%)',
          animation: 'burstFlash 0.6s ease-out forwards',
        }
      }),
    ),

    // === Phase 2: Station icon reveal ===
    phase >= 2 && el('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        position: 'relative', zIndex: 10,
      }
    },
      // Station icon
      el('div', {
        style: {
          fontSize: 80, lineHeight: 1, marginBottom: 24,
          animation: 'iconReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, iconGlow 2s ease-in-out 0.8s infinite',
        }
      }, station?.icon),

      // Station name
      el('div', {
        style: {
          fontFamily: 'Rajdhani, sans-serif',
          fontSize: 28, fontWeight: 700,
          color: 'var(--gold-bright)',
          textTransform: 'uppercase',
          animation: 'textReveal 0.7s ease-out 0.3s both',
          textShadow: '0 0 30px var(--gold-glow), 0 2px 10px rgba(0,0,0,0.5)',
        }
      }, station?.name),

      // "UNLOCKED" text
      el('div', {
        style: {
          fontFamily: 'Rajdhani, sans-serif',
          fontSize: 14, fontWeight: 600,
          color: 'var(--gold-dim)',
          letterSpacing: 6,
          marginTop: 8,
          animation: 'subtextFade 0.8s ease-out 0.6s both',
        }
      }, 'UNLOCKED'),

      // Decorative line
      el('div', {
        style: {
          width: 80, height: 1, marginTop: 16,
          background: 'linear-gradient(90deg, transparent, var(--gold-dim), transparent)',
          animation: 'subtextFade 1s ease-out 0.8s both',
        }
      }),
    ),

    // === Phase 2: Sparkle particles ===
    phase >= 2 && phase < 3 && el('div', {
      style: { position: 'absolute', top: '50%', left: '50%', width: 0, height: 0 }
    },
      ...sparkles.map((sp, i) =>
        el('div', {
          key: `sparkle-${i}`,
          style: {
            position: 'absolute',
            width: sp.size, height: sp.size,
            background: 'var(--gold-bright)',
            borderRadius: '50%',
            '--dx': `${sp.dx}px`, '--dy': `${sp.dy}px`,
            animation: `sparkle 1.2s ease-out ${sp.delay}s both`,
            boxShadow: '0 0 4px var(--gold)',
          }
        })
      )
    ),
  );
}

// ═══════════════════════════════════════════════════════════════
// LevelUp Cinematic (overlay on current screen)
// ═══════════════════════════════════════════════════════════════
function LevelUpCinematic({ station, fromLevel, toLevel, onComplete }) {
  const [phase, setPhase] = useState(0);
  // 0: old level + shake (0~600ms)
  // 1: burst + new level pop (600~1800ms)
  // 2: rarity range reveal (1800~2800ms)
  // 3: fade out (2800~3400ms)

  useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 600);
    const t2 = setTimeout(() => setPhase(2), 1800);
    const t3 = setTimeout(() => setPhase(3), 2800);
    const t4 = setTimeout(() => onComplete(), 3400);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
  }, []);

  const stars = useMemo(() => {
    return Array.from({ length: 16 }, (_, i) => {
      const angle = (i / 16) * Math.PI * 2;
      const dist = 60 + Math.random() * 80;
      return {
        tx: Math.cos(angle) * dist,
        ty: Math.sin(angle) * dist,
        delay: Math.random() * 0.3,
        size: 6 + Math.random() * 10,
        char: ['✦', '✧', '⬥', '◆'][Math.floor(Math.random() * 4)],
      };
    });
  }, []);

  const el = React.createElement;
  const fromMaxLabel = getMaxRarityLabel(fromLevel);
  const toMaxLabel = getMaxRarityLabel(toLevel);
  const toMaxKey = getMaxRarityKey(toLevel);

  return el('div', {
    style: {
      position: 'fixed', inset: 0, zIndex: 2000,
      background: 'rgba(0, 0, 0, 0.85)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column',
      animation: phase === 3 ? 'cinematicFadeOut 0.6s ease forwards' : 'fadeIn 0.2s ease',
    }
  },
    // Station icon (always visible)
    el('div', {
      style: {
        fontSize: 56, marginBottom: 20,
        animation: phase === 0 ? 'lockShake 0.6s ease-in-out' : 'none',
        filter: phase >= 1 ? 'drop-shadow(0 0 20px var(--gold-glow))' : 'none',
        transition: 'filter 0.3s',
      }
    }, station?.icon),

    // Station name
    el('div', {
      style: {
        fontSize: 16, fontWeight: 600, color: 'var(--text-primary)',
        marginBottom: 24, opacity: 0.8,
      }
    }, station?.name),

    // Level transition
    el('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 20,
        position: 'relative',
      }
    },
      // Old level
      el('div', {
        style: {
          fontFamily: 'Rajdhani, sans-serif', fontSize: 48, fontWeight: 700,
          color: 'var(--gold-dim)',
          opacity: phase >= 1 ? 0.3 : 1,
          transition: 'opacity 0.3s',
        }
      }, formatLevel(fromLevel)),

      // Arrow
      phase >= 1 && el('div', {
        style: {
          fontSize: 28, color: 'var(--gold)',
          animation: 'lvlArrowSlide 0.3s ease-out both',
        }
      }, '→'),

      // New level
      phase >= 1 && el('div', {
        style: {
          fontFamily: 'Rajdhani, sans-serif', fontSize: 64, fontWeight: 700,
          color: 'var(--gold-bright)',
          animation: 'lvlNumberPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both',
          textShadow: '0 0 30px var(--gold-glow), 0 0 60px rgba(212,168,67,0.2)',
          position: 'relative',
        }
      },
        formatLevel(toLevel),

        // Burst ring behind number
        el('div', {
          style: {
            position: 'absolute', top: '50%', left: '50%',
            width: 160, height: 160, borderRadius: '50%',
            border: '2px solid var(--gold)',
            animation: 'lvlRingExpand 0.8s ease-out forwards',
            pointerEvents: 'none',
          }
        }),
      ),
    ),

    // Star particles (phase 1)
    phase >= 1 && phase < 3 && el('div', {
      style: { position: 'absolute', top: '50%', left: '50%', width: 0, height: 0 }
    },
      ...stars.map((s, i) =>
        el('div', {
          key: `star-${i}`,
          style: {
            position: 'absolute',
            fontSize: s.size,
            color: i % 2 === 0 ? 'var(--gold-bright)' : 'var(--gold)',
            '--tx': `${s.tx}px`, '--ty': `${s.ty}px`,
            animation: `lvlStarBurst 0.9s ease-out ${s.delay}s both`,
          }
        }, s.char)
      )
    ),

    // Rarity range change (phase 2)
    phase >= 2 && el('div', {
      style: {
        marginTop: 28, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
        animation: 'lvlRarityReveal 0.4s ease-out both',
      }
    },
      el('div', {
        style: { fontSize: 11, color: 'var(--text-secondary)', letterSpacing: 2, fontWeight: 600 }
      }, '제작 가능 최대 등급'),
      el('div', {
        style: {
          display: 'flex', alignItems: 'center', gap: 12,
          fontSize: 15, fontWeight: 600,
        }
      },
        el('span', { style: { color: '#666' } }, fromMaxLabel),
        el('span', { style: { color: 'var(--gold-dim)', fontSize: 12 } }, '→'),
        el('span', {
          style: {
            color: toMaxKey ? RARITY_INFO[toMaxKey].color : 'var(--gold-bright)',
            textShadow: toMaxKey ? `0 0 10px ${RARITY_INFO[toMaxKey].border}` : '0 0 10px var(--gold-glow)',
          }
        }, toMaxLabel),
      ),
    ),
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN 1: Station Selection
// ═══════════════════════════════════════════════════════════════
function StationSelectScreen({ stations, blueprints, inventory, onSelectStation, onUnlockStation, onGoCollection, onRegisterBlueprint, onNavigateToCraft }) {
  const [unlockModal, setUnlockModal] = useState(null);
  const [registerModal, setRegisterModal] = useState(false);

  // Collect all owned but unregistered blueprints across all stations
  const registrableBlueprints = useMemo(() => {
    const result = [];
    Object.entries(blueprints).forEach(([sid, section]) => {
      const station = stations.find(s => s.id === parseInt(sid));
      section.items.forEach(bp => {
        if (bp.owned && !bp.registered) {
          result.push({ ...bp, stationId: parseInt(sid), stationName: station?.name || section.name, stationIcon: station?.icon || section.icon });
        }
      });
    });
    return result;
  }, [blueprints, stations]);

  const handleCardClick = (station) => {
    if (station.level > 0) {
      onSelectStation(station.id);
    } else {
      setUnlockModal(station.id);
    }
  };

  const handleUnlock = (stationId) => {
    onUnlockStation(stationId);
    setUnlockModal(null);
  };

  return React.createElement('div', {
    style: {
      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
      justifyContent: 'center', padding: 60, position: 'relative',
      background: 'radial-gradient(ellipse at 50% 40%, rgba(212,168,67,0.03) 0%, transparent 60%)',
    }
  },
    // Title area
    React.createElement('div', {
      style: { textAlign: 'center', marginBottom: 48, animation: 'fadeIn 0.5s ease' }
    },
      React.createElement('h1', {
        style: {
          fontFamily: 'Rajdhani, sans-serif', fontSize: 36, fontWeight: 700,
          color: 'var(--gold)', letterSpacing: 3, marginBottom: 8,
        }
      }, 'CRAFT STATION'),
      React.createElement('p', {
        style: { color: 'var(--text-secondary)', fontSize: 14 }
      }, '제작대를 선택하여 아이템을 제작하세요')
    ),

    // Station Grid (2 rows: 3 + 2)
    React.createElement('div', {
      style: {
        display: 'grid', gridTemplateColumns: 'repeat(3, 240px)', gap: 20,
        justifyContent: 'center', marginBottom: 32,
      }
    },
      stations.map((station, idx) => {
        const isLocked = station.level === 0;
        const maxRarityKey = station.level > 0 ? getMaxRarityKey(station.level) : null;

        // 잠금해제/레벨업 가능 여부 체크
        let canUpgrade = false;
        if (isLocked) {
          const reqs = UNLOCK_REQUIREMENTS[station.id];
          canUpgrade = reqs && reqs.every(r => (inventory[r.name] || 0) >= r.need);
        } else if (station.level < MAX_LEVEL) {
          const reqs = LEVELUP_REQUIREMENTS[`${station.id}_${station.level + 1}`];
          canUpgrade = reqs && reqs.every(r => (inventory[r.name] || 0) >= r.need);
        }

        return React.createElement('div', {
          key: station.id,
          onClick: () => handleCardClick(station),
          style: {
            width: 240, height: 200,
            background: isLocked ? (canUpgrade ? '#0d0d14' : '#0c0c12') : 'var(--bg-tertiary)',
            border: `1px solid ${canUpgrade ? (isLocked ? 'rgba(34,197,94,0.35)' : 'rgba(34,197,94,0.25)') : isLocked ? '#1a1a22' : '#2a2a38'}`,
            borderRadius: 12, cursor: 'pointer', position: 'relative', overflow: 'hidden',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            opacity: isLocked ? (canUpgrade ? 0.85 : 0.55) : 1,
            filter: isLocked ? (canUpgrade ? 'saturate(0.5)' : 'saturate(0.2)') : 'none',
            transition: 'all 0.3s ease',
            animation: `slideUp 0.4s ease ${idx * 0.07}s both`,
            boxShadow: canUpgrade ? '0 0 20px rgba(34,197,94,0.08)' : (isLocked ? 'none' : '0 4px 20px rgba(0,0,0,0.3)'),
          },
          onMouseEnter: e => {
            if (!isLocked || canUpgrade) {
              e.currentTarget.style.borderColor = canUpgrade ? 'rgba(34,197,94,0.6)' : 'var(--gold-dim)';
              e.currentTarget.style.transform = 'translateY(-2px)';
            }
          },
          onMouseLeave: e => {
            e.currentTarget.style.borderColor = canUpgrade ? (isLocked ? 'rgba(34,197,94,0.35)' : 'rgba(34,197,94,0.25)') : isLocked ? '#1a1a22' : '#2a2a38';
            e.currentTarget.style.transform = 'none';
          },
        },
          // Lock overlay
          isLocked && !canUpgrade && React.createElement('div', {
            style: {
              position: 'absolute', inset: 0, display: 'flex', alignItems: 'center',
              justifyContent: 'center', zIndex: 2,
            }
          },
            React.createElement('span', {
              style: {
                fontSize: 40, opacity: 0.6, filter: 'grayscale(0.5)',
                position: 'absolute', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)',

          ),

          // Unlock-available overlay
          isLocked && canUpgrade && React.createElement('div', {
            style: {
              position: 'absolute', inset: 0, display: 'flex', alignItems: 'center',
              justifyContent: 'center', zIndex: 2,
            }
          },
            React.createElement('span', {
              style: {
                fontSize: 36, opacity: 0.8,
                position: 'absolute', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)',
                animation: 'tabUpgradeGlow 2s ease-in-out infinite',
              }
            }, '🔓')
          ),

          // Station icon
          React.createElement('div', {
            style: {
              fontSize: 48, marginBottom: 12, position: 'relative', zIndex: 1,

          }, station.icon),

          // Station name
          React.createElement('div', {
            style: {
              fontSize: 15, fontWeight: 600,
              color: isLocked ? (canUpgrade ? '#999' : '#555') : 'var(--text-primary)',

          }, station.name),

          // Level / Lock status
          !isLocked && React.createElement('div', {
            style: { display: 'flex', alignItems: 'center', gap: 6, zIndex: 1 }
          },
            React.createElement('span', {
              style: {
                fontFamily: 'Rajdhani, sans-serif', fontSize: 14, fontWeight: 600,
                color: 'var(--gold)', letterSpacing: 1,
              }
            }, formatLevel(station.level)),
            maxRarityKey && React.createElement('span', {
              style: {
                fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 4,
                color: RARITY_INFO[maxRarityKey].color,
                background: RARITY_INFO[maxRarityKey].bg,
                border: `1px solid ${RARITY_INFO[maxRarityKey].border}`,
              }
            }, RARITY_INFO[maxRarityKey].label),
            // 레벨업 가능 표시
            canUpgrade && React.createElement('span', {
              style: {
                fontSize: 10, fontWeight: 700, color: '#22c55e',
                animation: 'tabUpgradeGlow 2s ease-in-out infinite',
              }
            }, '▲ UP'),
          ),

          // Lock status text
          isLocked && !canUpgrade && React.createElement('div', {
            style: { fontSize: 11, color: '#555', zIndex: 1 }

          // Unlock available text
          isLocked && canUpgrade && React.createElement('div', {

              fontSize: 11, color: '#22c55e', zIndex: 1, fontWeight: 600,
              animation: 'tabUpgradeGlow 2s ease-in-out infinite',

          // Subtle gradient overlay for unlocked

            style: {

              pointerEvents: 'none',
            }

          // Green gradient overlay for upgradeable
          canUpgrade && React.createElement('div', {
            style: {
              position: 'absolute', bottom: 0, left: 0, right: 0, height: 60,
              background: 'linear-gradient(transparent, rgba(34,197,94,0.06))',
              pointerEvents: 'none',

    ),

    // Bottom buttons row
    React.createElement('div', {
      style: {
        display: 'flex', gap: 12, animation: 'slideUp 0.4s ease 0.4s both',

    },
      // Blueprint Collection button
      React.createElement('button', {
        onClick: onGoCollection,
        style: {
          background: 'rgba(212,168,67,0.08)', border: '1px solid rgba(212,168,67,0.2)',
          borderRadius: 8, padding: '12px 28px', color: 'var(--gold)', cursor: 'pointer',
          fontSize: 14, fontWeight: 500, fontFamily: 'Noto Sans KR, sans-serif',
          display: 'flex', alignItems: 'center', gap: 8, transition: 'all 0.2s',
        },
        onMouseEnter: e => { e.currentTarget.style.background = 'rgba(212,168,67,0.15)'; },
        onMouseLeave: e => { e.currentTarget.style.background = 'rgba(212,168,67,0.08)'; },
      }, '📖', ' 설계도 도감'),

      // Blueprint Register button
      React.createElement('button', {
        onClick: () => setRegisterModal(true),
        style: {
          background: registrableBlueprints.length > 0 ? 'rgba(34,197,94,0.08)' : 'rgba(255,255,255,0.03)',
          border: `1px solid ${registrableBlueprints.length > 0 ? 'rgba(34,197,94,0.3)' : '#1e1e28'}`,
          borderRadius: 8, padding: '12px 28px', cursor: 'pointer',

        onMouseLeave: e => { e.currentTarget.style.background = registrableBlueprints.length > 0 ? 'rgba(34,197,94,0.08)' : 'rgba(255,255,255,0.03)'; },

        '📜', ' 설계도 등록',

// SCREEN 2: Crafting Screen
// ═══════════════════════════════════════════════════════════════
function CraftScreen({ stations, blueprints, inventory, activeStationId, initialItemId, onChangeStation, onBack, onLevelUp, onUnlockStation, onRegisterBlueprint, onNavigateToCraft, consumeMaterials, addToast, ownedItems, addOwnedItem }) {
  const [selectedItem, setSelectedItem] = useState(null);
  const [selectedGrade, setSelectedGrade] = useState(null);
  const [search, setSearch] = useState('');
  const [favTab, setFavTab] = useState('all'); // 'all' | 'fav'
  const [favorites, setFavorites] = useState(new Set());
  const [expandedCats, setExpandedCats] = useState(() => {
    const all = new Set();
    Object.values(CRAFT_ITEMS).forEach(sd => sd.categories.forEach(c => all.add(c.name)));
    return all;
  });
  const [levelUpModal, setLevelUpModal] = useState(false);
  const [craftAnim, setCraftAnim] = useState(null); // null | 'hammering' | 'burst' | 'done'
  const [blueprintModal, setBlueprintModal] = useState(false);
  const [hoveredMat, setHoveredMat] = useState(null); // { mat, ri, x, y } or null
  const [unlockModal, setUnlockModal] = useState(null);
  const [equipPopup, setEquipPopup] = useState(false); // show equip select popup
  const [randomOptionPopup, setRandomOptionPopup] = useState(false); // show random option list popup
  const [selectedEquipItem, setSelectedEquipItem] = useState(null); // selected equipment for craft
  const [craftQuantity, setCraftQuantity] = useState(1); // actual craft quantity

  const station = stations.find(s => s.id === activeStationId);
  const stationData = CRAFT_ITEMS[activeStationId];

  // 아이템의 제작 가능 등급 중 가장 낮은 등급 반환
  const getLowestGrade = (item) => {
    if (item.availableGrades) return item.availableGrades[0];
    // availableGrades 미지정 → 제작대 레벨 범위 내 가장 낮은 등급
    return RARITY_ORDER.find(r => isRarityInRange(r, station?.level)) || 'common';
  };

  // Get visible items (filter out unregistered blueprint items)
  // 설계도 등록된 아이템은 등급 범위 밖이어도 levelLocked 플래그와 함께 포함
  const visibleItems = useMemo(() => {
    if (!stationData) return [];
    const items = [];
    stationData.categories.forEach(cat => {
      const filtered = [];
      cat.items.forEach(item => {
        const isRegistered = item.needBlueprint
          ? blueprints[activeStationId]?.items?.some(bp => bp.name === item.name && bp.registered)
          : true;
        if (item.needBlueprint && !isRegistered) return;

        const grades = item.availableGrades || RARITY_ORDER;
        const inRange = grades.some(g => isRarityInRange(g, station?.level));

        // 등급 범위 밖이면: 설계도 등록된 아이템만 levelLocked로 포함
        if (!inRange) {
          if (!item.needBlueprint || !isRegistered) return;
          if (search && !item.name.includes(search)) return;
          if (favTab === 'fav' && !favorites.has(item.id)) return;
          const reqLevel = getRequiredLevel(item);
          filtered.push({ ...item, levelLocked: true, requiredLevel: reqLevel });
          return;
        }

        if (search && !item.name.includes(search)) return;
        if (favTab === 'fav' && !favorites.has(item.id)) return;
        filtered.push({ ...item, levelLocked: false });
      });
      if (filtered.length > 0) items.push({ ...cat, items: filtered });
    });
    return items;
  }, [stationData, station, search, favTab, favorites, blueprints]);

  // Auto-select first item
  useEffect(() => {
    if (!selectedItem && visibleItems.length > 0 && visibleItems[0].items.length > 0) {
      const first = visibleItems[0].items[0];
      setSelectedItem(first);
      setSelectedGrade(first.levelLocked ? first.grade : getLowestGrade(first));
    }
  }, [visibleItems, activeStationId]);

  // Auto-select by initialItemId (from material click navigation)
  useEffect(() => {
    if (initialItemId && stationData) {
      for (const cat of stationData.categories) {
        const found = cat.items.find(it => it.id === initialItemId);
        if (found) {
          setSelectedItem(found);
          setSelectedGrade(getLowestGrade(found));
          // Expand the category
          setExpandedCats(prev => new Set([...prev, cat.name]));
          return;
        }
      }
    }
  }, [initialItemId, activeStationId]);

  // Sync selectedItem with visibleItems (e.g. after level up, levelLocked may change)
  useEffect(() => {
    if (selectedItem) {
      for (const cat of visibleItems) {
        const updated = cat.items.find(it => it.id === selectedItem.id);
        if (updated && updated.levelLocked !== selectedItem.levelLocked) {
          setSelectedItem(updated);
          if (!updated.levelLocked) {
            setSelectedGrade(getLowestGrade(updated));
          }
          break;
        }
      }
    }
  }, [visibleItems]);

  // Reset when station changes
  useEffect(() => {
    if (!initialItemId) {
      setSelectedItem(null);
      setSelectedGrade(null);
    }
    setSearch('');
  }, [activeStationId]);

  const toggleCat = (catName) => {
    const next = new Set(expandedCats);
    if (next.has(catName)) next.delete(catName); else next.add(catName);
    setExpandedCats(next);
  };

  const toggleFav = (itemId) => {
    const next = new Set(favorites);
    if (next.has(itemId)) next.delete(itemId); else next.add(itemId);
    setFavorites(next);
  };

  // 등급별 스케일링된 재료 필요량
  const getScaledNeed = (baseNeed, grade) => Math.ceil(baseNeed * (GRADE_MULTIPLIER[grade] || 1));

  // Check if equipment material is available
  const hasEquipMaterial = selectedItem?.equipMaterial
    ? INVENTORY_EQUIPMENT.some(eq => eq.name === selectedItem.equipMaterial.itemName && eq.rarity === selectedItem.equipMaterial.rarity)
    : true;

  // Has equipment material → no multi-craft
  const isEquipRecipe = !!selectedItem?.equipMaterial;
  const stackCount = selectedItem?.stackCount || 1;

  // Maximum craftable quantity (multiple of stackCount)
  const maxCraftable = useMemo(() => {
    if (!selectedItem || !selectedGrade) return stackCount;
    let maxMultiplier = Infinity;
    selectedItem.materials.forEach(m => {
      const have = inventory[m.name] || 0;
      const need = getScaledNeed(m.need, selectedGrade);
      if (need > 0) {
        maxMultiplier = Math.min(maxMultiplier, Math.floor(have / need));
      }
    });
    if (!isFinite(maxMultiplier) || maxMultiplier < 1) return 0;
    return maxMultiplier * stackCount;
  }, [selectedItem, inventory, selectedGrade, stackCount]);

  // Craft quantity multiplier (how many batches)
  const craftMultiplier = Math.max(1, Math.round(craftQuantity / stackCount));

  const canCraftNow = !selectedItem?.levelLocked && selectedItem?.materials.every(m =>
    (inventory[m.name] || 0) >= getScaledNeed(m.need, selectedGrade) * craftMultiplier
  ) && hasEquipMaterial;

  // Reset craft quantity on item/grade change
  useEffect(() => {
    setCraftQuantity(selectedItem?.stackCount || 1);
  }, [selectedItem?.id, selectedGrade]);

  // Clamp craft quantity when maxCraftable changes (e.g. after crafting)
  useEffect(() => {
    if (maxCraftable > 0 && craftQuantity > maxCraftable) {
      setCraftQuantity(Math.max(stackCount, maxCraftable));
    }
  }, [maxCraftable]);

  const handleQuantityChange = (delta) => {
    setCraftQuantity(prev => {
      const next = prev + delta * stackCount;
      if (next < stackCount) return stackCount;
      if (next > maxCraftable) return maxCraftable;
      return next;
    });
  };

  const handleCraft = () => {
    if (!selectedItem || !canCraftNow || craftAnim) return;
    // If recipe has equipMaterial, show equipment select popup first
    if (selectedItem.equipMaterial) {
      setEquipPopup(true);
      return;
    }
    executeCraft();
  };

  const executeCraft = (selectedEquip) => {
    const multiplier = isEquipRecipe ? 1 : craftMultiplier;
    const entries = selectedItem.materials.map(m => ({ name: m.name, amount: getScaledNeed(m.need, selectedGrade) * multiplier }));
    consumeMaterials(entries);
    const resultQuantity = isEquipRecipe ? 1 : craftQuantity;
    // Phase 1: hammering (1.2s)
    setCraftAnim('hammering');
    setTimeout(() => {
      // Phase 2: burst (0.6s)
      setCraftAnim('burst');
      setTimeout(() => {
        setCraftAnim(null);
        addOwnedItem(selectedItem.id, resultQuantity);
        const qtyText = resultQuantity > 1 ? ` x${resultQuantity}` : '';
        const equipNote = selectedEquip ? ` (${selectedEquip.name} #${selectedEquip.id.replace('eq', '')} 사용)` : '';
        addToast('success', `${selectedItem.name} (${RARITY_INFO[selectedGrade].label})${qtyText} 제작 완료!${equipNote}`);
      }, 600);
    }, 1200);
  };

  const handleEquipConfirm = (selectedEquip) => {
    setEquipPopup(false);
    setSelectedEquipItem(selectedEquip);
    executeCraft(selectedEquip);
  };

  const handleLevelUp = () => {
    if (!canDoLevelUp) return;
    onLevelUp(activeStationId);
    setLevelUpModal(false);
  };

  const levelUpKey = station ? `${activeStationId}_${station.level + 1}` : null;
  const levelUpReqs = levelUpKey ? LEVELUP_REQUIREMENTS[levelUpKey]?.map(r => ({ ...r, have: inventory[r.name] || 0 })) : null;
  const canDoLevelUp = levelUpReqs?.every(r => r.have >= r.need);
  const maxRarityLabel = station ? getMaxRarityLabel(station.level) : null;

  if (!station || !stationData) {
    return React.createElement('div', {
      style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#555' }
    }, '제작 데이터가 없습니다');
  }

  return React.createElement('div', {
    style: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }
  },
    // Station tabs
    React.createElement('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 4, padding: '8px 16px',
        background: '#0c0c12', borderBottom: '1px solid #1a1a24', flexShrink: 0,
      }
    },
      React.createElement('button', {
        onClick: onBack,
        style: {
          background: 'none', border: '1px solid #2a2a3a', borderRadius: 6,
          color: '#666', padding: '6px 10px', cursor: 'pointer', fontSize: 12, marginRight: 8,
        }
      }, '← 돌아가기'),
      stations.map(s => {
        const isActive = s.id === activeStationId;
        const isLocked = s.level === 0;

        // 잠금해제/레벨업 가능 여부 체크
        let canUpgrade = false;
        if (isLocked) {
          const reqs = UNLOCK_REQUIREMENTS[s.id];
          canUpgrade = reqs && reqs.every(r => (inventory[r.name] || 0) >= r.need);
        } else if (s.level < MAX_LEVEL) {
          const reqs = LEVELUP_REQUIREMENTS[`${s.id}_${s.level + 1}`];
          canUpgrade = reqs && reqs.every(r => (inventory[r.name] || 0) >= r.need);
        }

        return React.createElement('button', {
          key: s.id,
          onClick: () => isLocked ? setUnlockModal(s.id) : onChangeStation(s.id),
          style: {
            position: 'relative',
            background: isActive ? 'rgba(212,168,67,0.1)' : canUpgrade ? 'rgba(34,197,94,0.06)' : 'transparent',
            border: `1px solid ${isActive ? 'var(--gold-dim)' : canUpgrade ? 'rgba(34,197,94,0.3)' : 'transparent'}`,
            borderRadius: 6, padding: '8px 14px', cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 6, transition: 'all 0.15s',
            opacity: isLocked ? (canUpgrade ? 0.85 : 0.45) : 1,
          }
        },
          React.createElement('span', { style: { fontSize: 16 } }, s.icon),
          React.createElement('span', {
            style: {
              fontSize: 12, fontWeight: isActive ? 600 : 400,
              color: isActive ? 'var(--gold)' : isLocked ? (canUpgrade ? '#8b8b8b' : '#444') : 'var(--text-secondary)',
            }
          }, s.name.replace(' 제작대', '')),
          !isLocked && React.createElement('span', {
            style: { fontSize: 10, color: isActive ? 'var(--gold-dim)' : '#555', fontFamily: 'Rajdhani' }
          }, formatLevel(s.level)),
          isLocked && !canUpgrade && React.createElement('span', { style: { fontSize: 12 } }, '🔒'),
          // 잠금해제 가능 표시
          isLocked && canUpgrade && React.createElement('span', {
            style: { fontSize: 11, color: '#22c55e', animation: 'tabUpgradeGlow 2s ease-in-out infinite' },
            title: '잠금해제 가능'
          }, '🔓'),
          // 레벨업 가능 표시
          !isLocked && canUpgrade && React.createElement('span', {
            style: {
              fontSize: 9, color: '#22c55e', fontWeight: 700,
              marginLeft: 2,
              animation: 'tabUpgradeGlow 2s ease-in-out infinite',
            },
            title: '레벨업 가능'
          }, '▲'),
        );
      })
    ),

    // Main 3-column layout
    React.createElement('div', {
      style: { flex: 1, display: 'flex', overflow: 'hidden' }
    },
      // LEFT: Item list
      React.createElement('div', {
        style: {
          width: 260, borderRight: '1px solid #1a1a24', display: 'flex',
          flexDirection: 'column', background: '#0c0c12', flexShrink: 0,
        }
      },
        // Search
        React.createElement('div', { style: { padding: 10, borderBottom: '1px solid #1a1a24' } },
          React.createElement('input', {
            type: 'text', placeholder: '🔍 아이템 검색...', value: search,
            onChange: e => setSearch(e.target.value),
            style: {
              width: '100%', padding: '8px 12px', background: '#0e0e16', border: '1px solid #222',
              borderRadius: 6, color: 'var(--text-primary)', fontSize: 12,
              fontFamily: 'Noto Sans KR', outline: 'none',
            }
          })
        ),
        // Tabs: All / Fav
        React.createElement('div', {
          style: { display: 'flex', borderBottom: '1px solid #1a1a24' }
        },
          ['all', 'fav'].map(tab =>
            React.createElement('button', {
              key: tab, onClick: () => setFavTab(tab),
              style: {
                flex: 1, padding: '8px 0', background: 'none', border: 'none',
                borderBottom: favTab === tab ? '2px solid var(--gold)' : '2px solid transparent',
                color: favTab === tab ? 'var(--gold)' : '#555', fontSize: 12,
                fontFamily: 'Noto Sans KR', cursor: 'pointer', fontWeight: favTab === tab ? 600 : 400,
              }
            }, tab === 'all' ? '전체' : '⭐ 즐겨찾기')
          )
        ),
        // Item list
        React.createElement('div', {
          className: 'scroll-area',
          style: { flex: 1, overflowY: 'auto', padding: '4px 6px' }
        },
          visibleItems.length === 0 ? React.createElement('div', {
            style: { textAlign: 'center', padding: 40, color: '#444', fontSize: 12 }
          }, favTab === 'fav' ? '즐겨찾기한 아이템이 없습니다' : '표시할 아이템이 없습니다')
          :
          visibleItems.map(cat =>
            React.createElement('div', { key: cat.name },
              // Category header
              React.createElement('div', {
                onClick: () => toggleCat(cat.name),
                style: {
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '8px 10px', cursor: 'pointer', fontSize: 11, color: '#666',
                  fontWeight: 600, letterSpacing: 0.5,
                }
              },
                React.createElement('span', null, cat.name),
                React.createElement('span', {
                  style: { fontSize: 9, transition: 'transform 0.2s',
                    transform: expandedCats.has(cat.name) ? 'rotate(0deg)' : 'rotate(-90deg)' }
                }, '▼'),
              ),
              // Items
              expandedCats.has(cat.name) && cat.items.map(item => {
                const isSelected = selectedItem?.id === item.id;
                const ri = RARITY_INFO[item.grade];
                const isLevelLocked = !!item.levelLocked;
                // 제작 가능 등급이 하나라도 있는지 체크
                const grades = isLevelLocked ? [] : (item.availableGrades || RARITY_ORDER.filter(r => isRarityInRange(r, station?.level)));
                const canCraftAny = !isLevelLocked && grades.some(g =>
                  item.materials.every(m => (inventory[m.name] || 0) >= getScaledNeed(m.need, g))
                );
                return React.createElement('div', {
                  key: item.id,
                  onClick: () => { setSelectedItem(item); setSelectedGrade(isLevelLocked ? item.grade : getLowestGrade(item)); },
                  style: {
                    display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
                    marginBottom: 2, borderRadius: 6, cursor: 'pointer',
                    background: isSelected ? 'rgba(255,255,255,0.06)' : 'transparent',
                    borderLeft: `3px solid ${isSelected ? 'var(--gold)' : 'transparent'}`,
                    transition: 'all 0.12s',
                    opacity: isLevelLocked ? 0.6 : 1,
                  },
                  onMouseEnter: e => { if (!isSelected) e.currentTarget.style.background = 'rgba(255,255,255,0.02)'; },
                  onMouseLeave: e => { if (!isSelected) e.currentTarget.style.background = 'transparent'; },
                },
                  // 제작 가능 표시 dot (levelLocked면 자물쇠 아이콘)
                  isLevelLocked
                    ? React.createElement('span', {
                        style: { fontSize: 10, flexShrink: 0, lineHeight: 1 }
                      }, '\uD83D\uDD12')
                    : React.createElement('div', {
                        style: {
                          width: 6, height: 6, borderRadius: '50%', flexShrink: 0,
                          background: canCraftAny ? '#22c55e' : '#2a2a35',
                          boxShadow: canCraftAny ? '0 0 6px rgba(34,197,94,0.4)' : 'none',
                          transition: 'all 0.2s',
                        }
                      }),
                  React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                    React.createElement('div', {
                      style: {
                        display: 'flex', alignItems: 'center', gap: 6,
                        fontSize: 12, fontWeight: 500,
                        color: isLevelLocked ? 'var(--text-dim)' : (canCraftAny ? 'var(--text-primary)' : 'var(--text-secondary)'),
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                      }
                    },
                      item.name,
                      isLevelLocked && React.createElement('span', {
                        style: {
                          fontSize: 10, fontWeight: 700, fontFamily: 'Rajdhani',
                          color: '#f97316', background: 'rgba(249,115,22,0.1)',
                          padding: '1px 5px', borderRadius: 3, border: '1px solid rgba(249,115,22,0.2)',
                          flexShrink: 0,
                        }
                      }, `Lv.${item.requiredLevel}`),
                    ),
                  ),
                  React.createElement('span', {
                    onClick: e => { e.stopPropagation(); toggleFav(item.id); },
                    style: { fontSize: 14, cursor: 'pointer', opacity: favorites.has(item.id) ? 1 : 0.2 }
                  }, '⭐')
                );
              })
            )
          )
        ),

        // Station info + Blueprint register (left panel bottom)
        React.createElement('div', {
          style: {
            padding: '10px 10px', borderTop: '1px solid #1a1a24', flexShrink: 0,
          }
        },
          // Station info row
          React.createElement('div', {
            style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }
          },
            React.createElement('span', { style: { fontSize: 16 } }, station.icon),
            React.createElement('span', {
              style: { fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }
            }, station.name),
            React.createElement('span', {
              style: {
                fontFamily: 'Rajdhani', fontSize: 12, fontWeight: 700, color: 'var(--gold)',
                padding: '1px 8px', background: 'rgba(212,168,67,0.1)',
                borderRadius: 4, border: '1px solid rgba(212,168,67,0.2)',
              }
            }, formatLevel(station.level)),
            maxRarityLabel && React.createElement('span', {
              style: {
                fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 4,
                color: RARITY_INFO[getMaxRarityKey(station.level)].color,
                background: RARITY_INFO[getMaxRarityKey(station.level)].bg,
                border: `1px solid ${RARITY_INFO[getMaxRarityKey(station.level)].border}`,
              }
            }, maxRarityLabel),
          ),
          // Buttons row
          React.createElement('div', {
            style: { display: 'flex', gap: 6 }
          },
            // Blueprint register button
            React.createElement('button', {
              onClick: () => setBlueprintModal(true),
              style: {
                flex: 1, padding: '8px 0', borderRadius: 6,
                background: 'rgba(77,155,255,0.08)', border: '1px solid rgba(77,155,255,0.2)',
                color: '#4D9BFF', cursor: 'pointer',
                fontSize: 12, fontWeight: 600, fontFamily: 'Noto Sans KR',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                transition: 'all 0.15s',
              },
              onMouseEnter: e => { e.currentTarget.style.background = 'rgba(77,155,255,0.15)'; },
              onMouseLeave: e => { e.currentTarget.style.background = 'rgba(77,155,255,0.08)'; },
            }, '📜 설계도 등록'),
            // Level up button
            station.level < MAX_LEVEL && (() => {
              const lvReqs = LEVELUP_REQUIREMENTS[`${station.id}_${station.level + 1}`];
              const canLvUp = lvReqs && lvReqs.every(r => (inventory[r.name] || 0) >= r.need);
              return React.createElement('button', {
                onClick: () => setLevelUpModal(true),
                style: {
                  padding: '8px 14px', borderRadius: 6,
                  background: canLvUp ? 'rgba(34,197,94,0.12)' : 'rgba(255,255,255,0.03)',
                  border: `1px solid ${canLvUp ? 'rgba(34,197,94,0.35)' : '#1e1e28'}`,
                  color: canLvUp ? '#22c55e' : '#555', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, fontFamily: 'Noto Sans KR',
                  transition: 'all 0.15s',
                },
                onMouseEnter: e => {
                  e.currentTarget.style.background = canLvUp ? 'rgba(34,197,94,0.2)' : 'rgba(255,255,255,0.06)';
                },
                onMouseLeave: e => {
                  e.currentTarget.style.background = canLvUp ? 'rgba(34,197,94,0.12)' : 'rgba(255,255,255,0.03)';
                },
              }, canLvUp ? '레벨업 ▲' : '레벨업');
            })(),
            station.level >= 5 && React.createElement('span', {
              style: { fontSize: 11, color: 'var(--gold-dim)', display: 'flex', alignItems: 'center', padding: '0 8px' }
            }, 'MAX'),
          ),
          // ESC key guide
          React.createElement('div', {
            style: {
              display: 'flex', alignItems: 'center', gap: 8,
              marginTop: 10, paddingTop: 10, borderTop: '1px solid #1a1a24',
            }
          },
            React.createElement('span', {
              style: {
                padding: '2px 8px', border: '1px solid #3a3a4a',
                borderRadius: 4, fontSize: 11, fontWeight: 600, color: '#888',
                background: 'rgba(255,255,255,0.04)', fontFamily: 'Rajdhani, sans-serif',
              }
            }, 'ESC'),
            React.createElement('span', {
              style: { fontSize: 12, color: 'var(--text-secondary)' }
            }, '뒤로가기'),
          ),
        ),
      ),

      // CENTER: Item detail
      React.createElement('div', {
        style: {
          flex: 1, display: 'flex', flexDirection: 'column', padding: 24,
          overflow: 'auto', animation: selectedItem ? 'fadeIn 0.25s ease' : 'none',
        },
        className: 'scroll-area',
      },
        selectedItem ? React.createElement(React.Fragment, null,
          // 3D Model Preview Zone
          React.createElement('div', {
            style: {
