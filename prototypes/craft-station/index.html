          background: '#18181f', border: '1px solid #2a2a35',
          borderRadius: 8, overflow: 'hidden',
        }
      },
        // ─ Top: Icon area with dark bg ─
        React.createElement('div', {
          style: {
            background: 'linear-gradient(180deg, #0e0e18, #141420)',
            padding: '24px 20px 16px', display: 'flex', flexDirection: 'column',
            alignItems: 'center', position: 'relative',
          }
        },
          // Grade badge (top right)
          React.createElement('div', {
            style: {
              position: 'absolute', top: 10, right: 12,
              fontSize: 11, fontWeight: 700, color: '#fff',
              background: ri.color, padding: '2px 10px',
              borderRadius: 3, letterSpacing: 0.5,
            }
          }, ri.label),
          // Blueprint icon (larger version)
          React.createElement('div', {
            style: {
              width: 72, height: 72, position: 'relative',
              background: '#0a0a12', border: `1.5px solid ${ri.border}`,
              borderRadius: 4, overflow: 'hidden', marginBottom: 12,
              boxShadow: `0 0 12px ${ri.bg}`,
            }
          },
            // Grid
            React.createElement('div', {
              style: {
                position: 'absolute', inset: 0,
                backgroundImage: 'linear-gradient(0deg, rgba(34,197,94,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(34,197,94,0.05) 1px, transparent 1px)',
                backgroundSize: '8px 8px',
              }
            }),
            // Disk shape
            React.createElement('div', {
              style: {
                position: 'absolute', top: 8, left: 12, width: 48, height: 56,
                background: 'rgba(10,10,20,0.85)', border: '1px solid rgba(34,197,94,0.3)',
                borderRadius: 3, display: 'flex', flexDirection: 'column',
                justifyContent: 'center', padding: '5px 3px', gap: 2,
              }
            },
              ...[0.5, 0.3, 0.45, 0.35, 0.5].map((op, i) =>
                React.createElement('div', { key: i, style: {
                  height: 1.2, background: `rgba(34,197,94,${op})`,
                  width: `${55 + Math.sin(i * 2) * 30}%`, borderRadius: 1,
                  marginLeft: i % 2 ? 'auto' : 0,
                }})
              ),
            ),
            // Glow
            React.createElement('div', {
              style: { position: 'absolute', inset: 0,
                background: 'radial-gradient(ellipse at center, rgba(34,197,94,0.1) 0%, transparent 60%)',
              }
            }),
            // Registered check on tooltip icon too
            card.registered && React.createElement('div', {
              style: { position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.3)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }
            },
              React.createElement('div', {
                style: { width: 22, height: 22, borderRadius: '50%',
                  background: 'rgba(34,197,94,0.2)', border: '1.5px solid rgba(34,197,94,0.8)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, color: '#22c55e', fontWeight: 900,
                }
              }, '✓')
            ),
          ),
          // Item name
          React.createElement('div', {
            style: { fontSize: 15, fontWeight: 700, color: ri.color, textAlign: 'center' }
          }, BP_INFO.name),
        ),
        // ─ Body ─
        React.createElement('div', { style: { padding: '12px 16px 14px' } },
          // Category tags
          React.createElement('div', {
            style: {
              display: 'flex', justifyContent: 'center', gap: 8,
              fontSize: 11, color: '#6a6a7a', marginBottom: 8,
            }
          },
            React.createElement('span', null, BP_INFO.cat1),
            React.createElement('span', { style: { color: '#3a3a4a' } }, '|'),
            React.createElement('span', null, BP_INFO.cat2),
          ),
          // Item Score
          React.createElement('div', {
            style: { fontSize: 13, color: '#ccc', fontWeight: 600, marginBottom: 6 }
          }, `Item Score : ${BP_INFO.score}`),
          // Stat icons row (placeholder)
          React.createElement('div', {
            style: { display: 'flex', gap: 8, marginBottom: 14 }
          },
            ...['⟳', '⚡', '⊘', '⚙', '⊕'].map((icon, i) =>
              React.createElement('span', {
                key: i,
                style: { fontSize: 14, color: '#3a3a4a', opacity: 0.6 }
              }, icon)
            )
          ),
          // Description
          React.createElement('div', {
            style: {
              fontSize: 12, color: '#8a8a9a', lineHeight: 1.7, marginBottom: 14,
              borderTop: '1px solid #222230', paddingTop: 12,
            }
          }, BP_INFO.desc),
          // Registration status badge
          React.createElement('div', {
            style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 6 }
          },
            React.createElement('span', {
              style: {
                fontSize: 11, fontWeight: 600,
                color: card.registered ? '#22c55e' : '#f59e0b',
                border: `1px solid ${card.registered ? 'rgba(34,197,94,0.4)' : 'rgba(245,158,11,0.4)'}`,
                borderRadius: 4, padding: '2px 10px',
                background: card.registered ? 'rgba(34,197,94,0.06)' : 'rgba(245,158,11,0.06)',
              }
            }, card.registered ? '등록 완료' : '미등록')
          ),
          // Trade restriction badge
          React.createElement('div', {
            style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }
          },
            React.createElement('span', {
              style: {
                fontSize: 11, fontWeight: 600, color: '#ef4444',
                border: '1px solid rgba(239,68,68,0.4)', borderRadius: 4,
                padding: '2px 10px', background: 'rgba(239,68,68,0.06)',
              }
            }, '거래소 이용 불가')
          ),
          // Bottom utility row
          React.createElement('div', {
            style: {
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              borderTop: '1px solid #222230', paddingTop: 10,
            }
          },
            // Left: utility icons
            React.createElement('div', { style: { display: 'flex', gap: 8 } },
              ...['♻️', '⚡', 'ⓘ'].map((icon, i) =>
                React.createElement('span', {
                  key: i,
                  style: { fontSize: 16, opacity: 0.5, filter: 'grayscale(0.5)' }
                }, icon)
              )
            ),
            // Right: weight
            React.createElement('div', {
              style: { display: 'flex', alignItems: 'center', gap: 6 }
            },
              React.createElement('span', { style: { fontSize: 16 } }, '⚖️'),
              React.createElement('span', {
                style: { fontSize: 14, fontWeight: 700, color: '#aaa', fontFamily: 'Rajdhani, sans-serif' }
              }, BP_INFO.weight)
            ),
          ),
        ),
      ),
    );
  };

  // ── Main render ──
  const activeCard = CARDS.find(c => c.id === hoveredCard);

  return React.createElement('div', {
    style: {
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.78)', zIndex: 900,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      animation: 'fadeIn 0.2s ease',
    },
    onClick: onClose,
  },
    React.createElement('div', {
      style: {
        background: '#12121a', border: '1px solid #2a2a3a', borderRadius: 14,
        width: 520, maxWidth: '92vw',
        animation: 'popupIn 0.3s ease', boxShadow: '0 20px 80px rgba(0,0,0,0.6)',
      },
      onClick: e => e.stopPropagation(),
    },
      // Header
      React.createElement('div', {
        style: {
          padding: '18px 24px', borderBottom: '1px solid #2a2a3a',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }
      },
        React.createElement('div', null,
          React.createElement('div', {
            style: { fontSize: 15, fontWeight: 700, color: 'var(--gold)', display: 'flex', alignItems: 'center', gap: 6 }
          },
            React.createElement('span', { style: { fontSize: 16 } }, '📜'),
            '설계도 인벤토리 UI'
          ),
          React.createElement('div', {
            style: { fontSize: 11, color: 'var(--text-secondary)', marginTop: 3 }
          }, '아이콘에 마우스를 올려 인게임 툴팁을 확인하세요')
        ),
        React.createElement('button', {
          onClick: onClose,
          style: {
            background: 'none', border: '1px solid #333', borderRadius: 6,
            color: '#666', width: 28, height: 28, cursor: 'pointer', fontSize: 13,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }
        }, '✕'),
      ),
      // Cards container
      React.createElement('div', {
        style: {
          padding: '36px 24px 32px',
          display: 'flex', justifyContent: 'center', gap: 60,
        }
      },
        ...CARDS.map(card =>
          React.createElement('div', {
            key: card.id,
            style: {
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
            }
          },
            // State label
            React.createElement('div', {
              style: {
                fontSize: 13, fontWeight: 700,
                color: card.registered ? '#22c55e' : '#f59e0b',
                padding: '3px 16px', borderRadius: 20,
                background: card.registered ? 'rgba(34,197,94,0.1)' : 'rgba(245,158,11,0.1)',
                border: `1px solid ${card.registered ? 'rgba(34,197,94,0.25)' : 'rgba(245,158,11,0.25)'}`,
              }
            }, card.label),
            // Inventory slot icon
            renderSlotIcon(card),
            // Description
            React.createElement('div', {
              style: {
                fontSize: 11, color: 'var(--text-secondary)', textAlign: 'center',
                lineHeight: 1.6, maxWidth: 180, whiteSpace: 'pre-line', marginTop: 2,
              }
            }, card.sub),
          )
        ),
      ),
      // Bottom note
      React.createElement('div', {
        style: {
          padding: '0 24px 18px', display: 'flex', justifyContent: 'center',
        }
      },
        React.createElement('div', {
          style: {
            fontSize: 11, color: 'var(--text-dim)', padding: '8px 16px',
            background: 'rgba(255,255,255,0.02)', borderRadius: 6,
            border: '1px solid rgba(255,255,255,0.04)',
          }
        }, '💡 등록 시 설계도 아이템은 소모되며, 해당 제작대에서 레시피가 영구 해금됩니다')
      ),
    ),
    // Floating tooltip
    activeCard && renderTooltip(activeCard),
  );
}

// ═══════════════════════════════════════════════════════════════
// Main App
// ═══════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('select'); // 'select' | 'craft' | 'collection'
  const [stations, setStations] = useState(INITIAL_STATIONS);
  const [activeStationId, setActiveStationId] = useState(1);
  const [blueprints, setBlueprints] = useState(BLUEPRINT_COLLECTION);
  const [cinematicStation, setCinematicStation] = useState(null);
  const [levelUpCinematic, setLevelUpCinematic] = useState(null); // { station, fromLevel, toLevel }
  // Inventory: { materialName: count }
  const [inventory, setInventory] = useState(() => {
    const inv = {};
    const addMats = (mats) => mats.forEach(m => { inv[m.name] = Math.max(inv[m.name] || 0, m.have); });
    Object.values(CRAFT_ITEMS).forEach(s => s.categories.forEach(c => c.items.forEach(it => addMats(it.materials))));
    Object.values(UNLOCK_REQUIREMENTS).forEach(addMats);
    Object.values(LEVELUP_REQUIREMENTS).forEach(addMats);
    return inv;
  });

  const consumeMaterials = useCallback((entries) => {
    // entries: [{ name, amount }]
    setInventory(prev => {
      const next = { ...prev };
      entries.forEach(e => { next[e.name] = Math.max(0, (next[e.name] || 0) - e.amount); });
      return next;
    });
  }, []);

  // 아이템 보유 수량 (itemId → count)
  const [ownedItems, setOwnedItems] = useState(() => {
    const map = {};
    Object.values(CRAFT_ITEMS).forEach(s => s.categories.forEach(c => c.items.forEach(it => {
      map[it.id] = it.owned || 0;
    })));
    return map;
  });
  const addOwnedItem = useCallback((itemId, amount = 1) => {
    setOwnedItems(prev => ({ ...prev, [itemId]: (prev[itemId] || 0) + amount }));
  }, []);

  const [showBpPreview, setShowBpPreview] = useState(false);

  const [toasts, setToasts] = useState([]);
  const toastIdRef = useRef(0);

  const addToast = useCallback((type, message) => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev, { id, type, message }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  // ESC key handler (disabled during cinematic)
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (cinematicStation || levelUpCinematic) return;
      if (e.key === 'Escape') {
        if (showBpPreview) { setShowBpPreview(false); return; }
        if (screen === 'craft' || screen === 'collection') {
          setScreen('select');
        }
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [screen, cinematicStation, showBpPreview]);

  // Unlock: consume materials, go to landing, play cinematic
  const handleUnlockStation = (stationId) => {
    const station = stations.find(s => s.id === stationId);
    const reqs = UNLOCK_REQUIREMENTS[stationId];
    if (reqs) consumeMaterials(reqs.map(r => ({ name: r.name, amount: r.need })));
    setStations(prev => prev.map(s =>
      s.id === stationId ? { ...s, level: 1 } : s
    ));
    setScreen('select');
    setTimeout(() => setCinematicStation(station), 100);
  };

  const handleCinematicComplete = () => {
    addToast('success', `${cinematicStation?.name} 잠금 해제!`);
    setCinematicStation(null);
  };

  const handleRegisterBlueprint = (stationId, bpName) => {
    setBlueprints(prev => {
      const next = { ...prev };
      next[stationId] = {
        ...next[stationId],
        items: next[stationId].items.map(bp =>
          bp.name === bpName ? { ...bp, registered: true, owned: false } : bp
        ),
      };
      return next;
    });
    addToast('success', `${bpName} 설계도 등록 완료!`);
  };

  const handleLevelUp = (stationId) => {
    const station = stations.find(s => s.id === stationId);
    const fromLevel = station.level;
    const toLevel = Math.min(fromLevel + 1, MAX_LEVEL);
    const key = `${stationId}_${toLevel}`;
    const reqs = LEVELUP_REQUIREMENTS[key];
    if (reqs) consumeMaterials(reqs.map(r => ({ name: r.name, amount: r.need })));
    setStations(prev => prev.map(s =>
      s.id === stationId ? { ...s, level: toLevel } : s
    ));
    setLevelUpCinematic({ station, fromLevel, toLevel });
  };

  const handleLevelUpCinematicComplete = () => {
    addToast('success', `${levelUpCinematic?.station?.name} ${formatLevel(levelUpCinematic?.toLevel)} 달성!`);
    setLevelUpCinematic(null);
  };

  const [pendingItemId, setPendingItemId] = useState(null);

  const handleSelectStation = (stationId) => {
    setPendingItemId(null);
    setActiveStationId(stationId);
    setScreen('craft');
  };

  const handleGoToCraft = (stationId, itemName) => {
    let itemId = null;
    if (itemName) {
      const sd = CRAFT_ITEMS[stationId];
      if (sd) for (const cat of sd.categories) {
        const found = cat.items.find(it => it.name === itemName);
        if (found) { itemId = found.id; break; }
      }
    }
    setPendingItemId(itemId);
    setActiveStationId(stationId);
    setScreen('craft');
  };

  const handleNavigateToCraft = (stationId, itemId) => {
    setPendingItemId(itemId);
    setActiveStationId(stationId);
    setScreen('craft');
  };

  return React.createElement('div', {
      style: { height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }
    },
    React.createElement(TopNav),
    // Blueprint Status Preview 버튼 (좌상단 플로팅)
    React.createElement('button', {
      onClick: () => setShowBpPreview(true),
      style: {
        position: 'fixed', top: 12, left: 16, zIndex: 100,
        padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 6,
        background: 'linear-gradient(135deg, #1a1a28, #14141e)',
        border: '1px solid #2e2e3a', borderRadius: 8, cursor: 'pointer',
        color: 'var(--gold)', fontSize: 12, fontWeight: 600,
        boxShadow: '0 2px 12px rgba(0,0,0,0.4)',
        transition: 'all 0.2s ease',
      },
      onMouseEnter: e => { e.currentTarget.style.borderColor = 'var(--gold-dim)'; e.currentTarget.style.boxShadow = '0 2px 16px rgba(212,168,67,0.2)'; },
      onMouseLeave: e => { e.currentTarget.style.borderColor = '#2e2e3a'; e.currentTarget.style.boxShadow = '0 2px 12px rgba(0,0,0,0.4)'; },
    },
      React.createElement('span', { style: { fontSize: 14 } }, '📜'),
      '설계도 상태별 UI 표현'
    ),
    React.createElement('button', {
      onClick: () => {
        setInventory(prev => {
          const next = { ...prev };
          Object.keys(next).forEach(k => { next[k] = 999; });
          // 모든 레시피 재료도 추가
          Object.values(CRAFT_ITEMS).forEach(s => s.categories.forEach(c => c.items.forEach(it => {
            it.materials.forEach(m => { next[m.name] = 999; });
          })));
          Object.values(UNLOCK_REQUIREMENTS).forEach(mats => mats.forEach(m => { next[m.name] = 999; }));
          Object.values(LEVELUP_REQUIREMENTS).forEach(mats => mats.forEach(m => { next[m.name] = 999; }));
          return next;
        });
        addToast('모든 재료 999개로 충전!', 'success');
      },
      style: {
        position: 'fixed', top: 12, left: 210, zIndex: 100,
        padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 6,
        background: 'linear-gradient(135deg, #1a2818, #141e14)',
        border: '1px solid #2e3a2e', borderRadius: 8, cursor: 'pointer',
        color: '#22c55e', fontSize: 12, fontWeight: 600,
        boxShadow: '0 2px 12px rgba(0,0,0,0.4)',
        transition: 'all 0.2s ease',
      },
      onMouseEnter: e => { e.currentTarget.style.borderColor = '#22c55e'; e.currentTarget.style.boxShadow = '0 2px 16px rgba(34,197,94,0.2)'; },
      onMouseLeave: e => { e.currentTarget.style.borderColor = '#2e3a2e'; e.currentTarget.style.boxShadow = '0 2px 12px rgba(0,0,0,0.4)'; },
    },
      React.createElement('span', { style: { fontSize: 14 } }, '📦'),
      '재료 충전'
    ),
    React.createElement('div', {
      style: {
        flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden',
      }
    },
      screen === 'select' && React.createElement(StationSelectScreen, {
        stations, blueprints, inventory, onSelectStation: handleSelectStation,
        onUnlockStation: handleUnlockStation,
        onGoCollection: () => setScreen('collection'),
        onRegisterBlueprint: handleRegisterBlueprint,
        onNavigateToCraft: handleNavigateToCraft,
      }),
      screen === 'craft' && React.createElement(CraftScreen, {
        stations, blueprints, inventory, activeStationId, initialItemId: pendingItemId,
        onChangeStation: id => { setPendingItemId(null); setActiveStationId(id); },
        onBack: () => { setPendingItemId(null); setScreen('select'); },
        onLevelUp: handleLevelUp,
        onUnlockStation: handleUnlockStation,
        onRegisterBlueprint: handleRegisterBlueprint,
        onNavigateToCraft: handleNavigateToCraft,
        consumeMaterials, addToast, ownedItems, addOwnedItem,
      }),
      screen === 'collection' && React.createElement(BlueprintCollectionScreen, {
        stations, blueprints, inventory,
        onBack: () => setScreen('select'),
        onGoToCraft: handleGoToCraft,
        onUnlockStation: handleUnlockStation,
        onNavigateToCraft: handleNavigateToCraft,
        onRegisterBlueprint: handleRegisterBlueprint,
      }),
    ),
    screen !== 'craft' && React.createElement(KeyGuide, {
      text: screen === 'select' ? '플레이 탭으로 이동' : '뒤로가기'
    }),
    React.createElement(ToastContainer, { toasts, removeToast }),

    // Unlock Cinematic overlay
    cinematicStation && React.createElement(UnlockCinematic, {
      station: cinematicStation,
      onComplete: handleCinematicComplete,
    }),

    // LevelUp Cinematic overlay
    levelUpCinematic && React.createElement(LevelUpCinematic, {
      station: levelUpCinematic.station,
      fromLevel: levelUpCinematic.fromLevel,
      toLevel: levelUpCinematic.toLevel,
      onComplete: handleLevelUpCinematicComplete,
    }),

    // Blueprint Status Preview overlay
    React.createElement(BlueprintStatusPreview, {
      open: showBpPreview,
      onClose: () => setShowBpPreview(false),
    }),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
