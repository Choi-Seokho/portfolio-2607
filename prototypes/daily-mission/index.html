@keyframes checkPop { 0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }
@keyframes milestoneUnlock { 0% { transform: scale(1); } 30% { transform: scale(1.08); filter: brightness(1.3); } 100% { transform: scale(1); } }
@keyframes rewardReveal { 0% { transform: scale(0.5) rotateY(90deg); opacity: 0; } 50% { transform: scale(1.1) rotateY(0deg); opacity: 1; } 100% { transform: scale(1) rotateY(0deg); opacity: 1; } }
@keyframes boxOpen { 0% { transform: scale(1); } 20% { transform: scale(1.15) rotate(-3deg); } 40% { transform: scale(0.95) rotate(2deg); } 60% { transform: scale(1.05); } 100% { transform: scale(1); } }

  0% { transform: rotateX(0deg); opacity: 1; }
  30% { transform: rotateX(90deg); opacity: 0; }
  50% { transform: rotateX(90deg); opacity: 0; }
  80% { transform: rotateX(0deg); opacity: 1; }
  100% { transform: rotateX(0deg); opacity: 1; }

  30% { box-shadow: 0 0 20px rgba(99,102,241,0.4), inset 0 0 15px rgba(99,102,241,0.1); }
  70% { box-shadow: 0 0 20px rgba(99,102,241,0.4), inset 0 0 15px rgba(99,102,241,0.1); }
  100% { box-shadow: none; }

@keyframes floatingIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes floatingOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-8px); } }

// 슬롯들에서 등급 범위(최소~최대) 산출
function getRarityRange(slots) {
  let minIdx = RARITY_ORDER.length, maxIdx = -1;
  for (const slot of slots) {
    for (const item of slot.group) {
      const idx = RARITY_ORDER.indexOf(item.rarity);
      if (idx >= 0) { minIdx = Math.min(minIdx, idx); maxIdx = Math.max(maxIdx, idx); }
    }
  }
  if (maxIdx < 0) return null;
  return { min: RARITY_ORDER[minIdx], max: RARITY_ORDER[maxIdx] };
}

// ─── 보상 시스템 API ─────────────────────────────────
// boxId → RewardBox 조회
function getRewardBox(boxId) {
  return DT_RewardBox[boxId] || null;
}

// SpawnKey의 슬롯들을 resolve (groupId → 실제 group 데이터)
function resolveSlots(spawnKeyId) {
  const key = DT_RandomSpawnKey[spawnKeyId];
  if (!key) return [];
  return key.slots.map(slot => ({
    notSpawnRatio: slot.notSpawnRatio,
    group: DT_ItemSpawnGroup[slot.groupId] || [],
  }));
}

// 슬롯 기반 랜덤 롤
function rollSlots(slots) {
  const results = [];
  for (const slot of slots) {
    if (Math.random() * 1000 < slot.notSpawnRatio) continue;
    const totalRate = slot.group.reduce((sum, g) => sum + g.rate, 0);
    let roll = Math.random() * totalRate;
    for (const item of slot.group) {
      roll -= item.rate;
      if (roll <= 0) {
        const count = item.min + Math.floor(Math.random() * (item.max - item.min + 1));
        results.push({ name: item.name, rarity: item.rarity, count });
        break;
      }
    }
  }
  if (results.length === 0 && slots.length > 0 && slots[0].group.length > 0) {
    const fb = slots[0].group[0];
    results.push({ name: fb.name, rarity: fb.rarity, count: fb.min });
  }
  return results;
}

// boxId로 보상 롤 (어떤 시스템이든 이거만 호출)
function rollRewardBox(boxId) {
  const box = DT_RewardBox[boxId];
  if (!box) return [{ name: '알 수 없는 아이템', rarity: 'Common', count: 1 }];
  const slots = resolveSlots(box.spawnKeyId);
  return rollSlots(slots);
}

// 슬롯들에서 가능한 아이템 목록 추출 (툴팁용)
function getPossibleItems(slots) {
  const seen = new Map();
  for (const slot of slots) {
    for (const item of slot.group) {
      const key = item.name;
      if (!seen.has(key)) {
        seen.set(key, { name: item.name, rarity: item.rarity, min: item.min, max: item.max });
      }
    }
  }
  return [...seen.values()];
}

function App() {
  const [missions, setMissions] = useState(INITIAL_MISSIONS);
  const [charClass, setCharClass] = useState('Brick');
  const [claimedMissions, setClaimedMissions] = useState([]);
  const [claimedMilestones, setClaimedMilestones] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [rewardPopup, setRewardPopup] = useState(null);
  const [demoCollapsed, setDemoCollapsed] = useState(false);
  const [panelCollapsed, setPanelCollapsed] = useState(true);
  const [resetTimer, setResetTimer] = useState('17:32:45');
  const [tooltip, setTooltip] = useState(null); // { x, y, content }
  const [rerollCount, setRerollCount] = useState(0);
  const [rerollingId, setRerollingId] = useState(null); // 리롤 연출 중인 미션 id
  const [floatingQueue, setFloatingQueue] = useState([]); // 미션 완료 플로팅 큐
  const MAX_REROLLS = 3;

  const completedCount = useMemo(() => missions.filter(m => m.current >= m.target).length, [missions]);

  // ── 플로팅 알림 추가 헬퍼 ──
  const addFloating = useCallback((desc, isComplete) => {
    const text = isComplete ? `${desc} 완료` : desc;
    setFloatingQueue(q => [...q, { id: Date.now() + Math.random(), text, isComplete }]);
  }, []);

  // ── 플로팅 큐 자동 제거 (3초) ──
  useEffect(() => {
    if (floatingQueue.length === 0) return;
    const timer = setTimeout(() => setFloatingQueue(q => q.slice(1)), 3000);
    return () => clearTimeout(timer);
  }, [floatingQueue]);

  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  // Timer countdown
  useEffect(() => {
    const iv = setInterval(() => {
      setResetTimer(prev => {
        const p = prev.split(':').map(Number);
        let t = p[0]*3600 + p[1]*60 + p[2] - 1;
        if (t < 0) t = 86399;
        return `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, []);

  // 미션 보상 수령
  const claimMissionReward = useCallback((missionId) => {
    const mission = missions.find(m => m.id === missionId);
    if (!mission || mission.current < mission.target || claimedMissions.includes(missionId)) return;
    const items = rollRewardBox(mission.rewardBoxId);
    const box = getRewardBox(mission.rewardBoxId);
    setClaimedMissions(prev => [...prev, missionId]);
    setRewardPopup({ boxName: box?.name || '보상 상자', boxIcon: box?.icon || '📦', boxColor: getBoxColor(box), items, source: `📬 캐릭터 우편 — ${mission.description}` });
  }, [missions, claimedMissions]);

  // 마일스톤 보상 수령
  const claimMilestoneReward = useCallback((required) => {
    if (completedCount < required || claimedMilestones.includes(required)) return;
    const ms = MILESTONES.find(m => m.required === required);
    const msBox = getRewardBox(ms.boxId);
    const items = rollRewardBox(ms.boxId);
    setClaimedMilestones(prev => [...prev, required]);
    setRewardPopup({ boxName: msBox?.name || '보상 상자', boxIcon: msBox?.icon || '📦', boxColor: getBoxColor(msBox), items, source: `📬 캐릭터 우편 — ${ms.label}` });
  }, [completedCount, claimedMilestones]);

  // 미션 리롤 (연출 포함)
  const rerollMission = useCallback((missionId) => {
    if (rerollingId) return; // 연출 중 중복 방지
    if (rerollCount >= MAX_REROLLS) { addToast('리롤 횟수를 모두 사용했습니다', 'error'); return; }
    const mission = missions.find(m => m.id === missionId);
    if (!mission) return;
    if (mission.current >= mission.target) { addToast('완료된 미션은 리롤할 수 없습니다', 'error'); return; }
    if (claimedMissions.includes(missionId)) return;
    const pool = MISSION_POOLS[mission.slot];
    if (!pool || pool.length <= 1) { addToast('교체 가능한 미션이 없습니다', 'error'); return; }
    const candidates = pool.filter(p => p.type !== mission.type || p.description !== mission.description);
    if (candidates.length === 0) { addToast('교체 가능한 미션이 없습니다', 'error'); return; }
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    // 1) 연출 시작
    setRerollingId(missionId);
    // 2) 연출 중간(0.5s)에 실제 데이터 교체 — 카드가 뒤집혀있을 때
    setTimeout(() => {
      setMissions(prev => prev.map(m => {
        if (m.id === missionId) return { ...m, ...pick, current: 0, id: Date.now() + m.slot };
        return m;
      }));
      setRerollCount(prev => prev + 1);
    }, 500);
    // 3) 연출 종료(1s)
    setTimeout(() => {
      setRerollingId(null);
      const remaining = MAX_REROLLS - rerollCount - 1;
      addToast(`미션 교체 완료 (잔여 ${remaining}회)`, 'info');
    }, 1000);
  }, [missions, rerollCount, rerollingId, claimedMissions, addToast]);

  const progressMission = useCallback((id) => {
    setMissions(prev => {
      const next = prev.map(m => {
        if (m.id === id && m.current < m.target) return { ...m, current: Math.min(m.current + 1, m.target) };
        return m;
      });
      const m = next.find(x => x.id === id);
      const old = prev.find(x => x.id === id);
      if (old && m && old.current !== m.current) {
        const done = m.current >= m.target;
        const label = done ? m.description : `${m.description} ${m.current}/${m.target}`;
        setTimeout(() => addFloating(label, done), 0);
      }
      return next;
    });
  }, [addFloating]);

  const completeMission = useCallback((id) => {
    setMissions(prev => {
      const next = prev.map(m => {
        if (m.id === id && m.current < m.target) return { ...m, current: m.target };
        return m;
      });
      const m = next.find(x => x.id === id);
      const old = prev.find(x => x.id === id);
      if (old && m && old.current < old.target) {
        setTimeout(() => addFloating(`일일 미션 - ${m.description} 완료`, true), 0);
      }
      return next;
    });
  }, [addFloating]);

  const completeAll = useCallback(() => {
    setMissions(prev => {
      const incomplete = prev.filter(m => m.current < m.target);
      incomplete.forEach(m => {
        setTimeout(() => addFloating(`일일 미션 - ${m.description} 완료`, true), 0);
      });
      return prev.map(m => ({ ...m, current: m.target }));
    });
    addToast('모든 일일 미션 완료!', 'success');
  }, [addFloating, addToast]);

  const resetMissions = useCallback(() => {
    // 미수령 보상 자동 우편함 발송
    let mailCount = 0;
    // 1) 완료했지만 수령 안 한 미션 보상
    missions.forEach(m => {
      if (m.current >= m.target && !claimedMissions.includes(m.id)) mailCount++;
    });
    // 2) 해금됐지만 수령 안 한 마일스톤 보상
    MILESTONES.forEach(ms => {
      if (completedCount >= ms.required && !claimedMilestones.includes(ms.required)) mailCount++;
    });
    if (mailCount > 0) {
      addToast(`📬 미수령 보상 ${mailCount}건이 캐릭터 우편함으로 발송되었습니다`, 'info');
    }

    // 새 미션 지급
    const nm = [];
    for (let slot = 1; slot <= 5; slot++) {
      const pool = MISSION_POOLS[slot];
      const pick = pool[Math.floor(Math.random() * pool.length)];
      nm.push({ id: Date.now() + slot, slot, ...pick, current: 0 });
    }
    setMissions(nm);
    setClaimedMissions([]);
    setClaimedMilestones([]);
    setRerollCount(0);
    setRerollingId(null);
    addToast('일일 미션 초기화! 새 미션 지급', 'warning');
  }, [missions, claimedMissions, claimedMilestones, completedCount, addToast]);

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopNav />

      {/* Main lobby area */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden', background: 'radial-gradient(ellipse at 55% 45%, rgba(212,168,67,0.02) 0%, transparent 60%)' }}>

        {/* 플로팅 일일 미션 패널 */}
        <DailyMissionPanel
          missions={missions} completedCount={completedCount}
          claimedMissions={claimedMissions} claimedMilestones={claimedMilestones}

          onRerollMission={rerollMission} rerollCount={rerollCount} maxRerolls={MAX_REROLLS} rerollingId={rerollingId}
          setTooltip={setTooltip}
          collapsed={panelCollapsed} setCollapsed={setPanelCollapsed}
        />
          {/* 캐릭터 영역 */}
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ textAlign: 'center', animation: 'fadeIn 0.5s ease' }}>
              <div style={{ fontSize: 20, color: 'var(--text-dim)', fontFamily: 'Rajdhani', letterSpacing: 3 }}>LOBBY</div>
            </div>
          </div>

          {/* 하단 UI 요소들 */}
          <div style={{ padding: '0 36px 30px', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
            {/* 좌하단: 서버 선택 + 캐릭터 정보 */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 9, width: 510 }}>
              {/* 서버 선택 버튼 */}
              <button style={{ width: '100%', padding: '12px 24px', background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 9, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', transition: 'border-color 0.15s' }}>
                <span style={{ fontSize: 16, color: 'var(--text-dim)', fontFamily: 'Rajdhani', fontWeight: 600 }}>서버 선택</span>
                <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>

                  <span style={{ fontSize: 15, color: 'var(--text-dim)' }}>▲</span>

      <div style={{ position: 'fixed', bottom: 120, left: '50%', transform: 'translateX(-50%)', display: 'flex', flexDirection: 'column-reverse', gap: 12, zIndex: 9999, pointerEvents: 'none', alignItems: 'center' }}>

      {/* Demo Panel */}
      <DemoPanel collapsed={demoCollapsed} setCollapsed={setDemoCollapsed} missions={missions} completedCount={completedCount} charClass={charClass} setCharClass={setCharClass} progressMission={progressMission} completeMission={completeMission} completeAll={completeAll} resetMissions={resetMissions} claimedMissions={claimedMissions} claimedMilestones={claimedMilestones} />
    </div>
  );
}

// ─── 툴팁 내용 생성 헬퍼 ─────────────────────────────
function makeBoxTooltip(box, extra) {
  const slots = resolveSlots(box.spawnKeyId);
  const items = getPossibleItems(slots);
  const spawnKey = DT_RandomSpawnKey[box.spawnKeyId];
  const maxItems = spawnKey ? spawnKey.slots.length : 0;
  const rarityRange = getRarityRange(slots);
  return { icon: box.icon, name: box.name, color: getBoxColor(box), borderColor: getBoxBorder(box), description: box.description, items, extra, slotCount: slots.length, maxItems, rarityRange };
}

function showTooltipFromEvent(e, content, setTooltip) {
  const rect = e.currentTarget.getBoundingClientRect();
  setTooltip({ x: rect.right + 18, y: rect.top + rect.height / 2, content });
}

// ─── Fixed Tooltip 컴포넌트 ──────────────────────────
function FixedTooltip({ data }) {
  const { x, y, content } = data;
  const maxY = typeof window !== 'undefined' ? window.innerHeight - 220 : 600;
  const adjustedY = Math.min(y, maxY);
  const borderColor = content.borderColor || 'rgba(255,255,255,0.12)';
  return (
    <div style={{
      position: 'fixed', left: x, top: adjustedY, transform: 'translateY(-50%)',
      background: 'rgba(26,26,46,0.95)', border: `1px solid ${borderColor}`, borderRadius: 12,
      padding: '14px 18px', maxWidth: 280, zIndex: 9000,
      backdropFilter: 'blur(12px)', pointerEvents: 'none',
      boxShadow: '0 8px 24px rgba(0,0,0,0.5)',
      animation: 'fadeIn 0.12s ease',
    }}>
      {/* 화살표 */}
      <div style={{ position: 'absolute', top: '50%', right: '100%', transform: 'translateY(-50%)', width: 0, height: 0, borderTop: '8px solid transparent', borderBottom: '8px solid transparent', borderRight: `8px solid ${borderColor}` }} />

      {/* 상자 아이콘 + 이름 (등급 색상) */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 24, lineHeight: 1 }}>{content.icon}</span>
        <span style={{ fontSize: 16, fontWeight: 700, color: content.color }}>{content.name}</span>
      </div>

      {/* 상자 설명 */}
      <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 10, lineHeight: 1.4 }}>{content.description}</div>

      {/* 구분선 */}
      <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', margin: '8px 0' }} />

      {/* 최대 획득 개수 */}
      {content.maxItems > 0 && (
        <div style={{ fontSize: 13, color: 'var(--text-dim)', marginBottom: 6, display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ opacity: 0.7 }}>&#x1F4E6;</span>
          <span>최대 <span style={{ color: '#e5e7eb', fontWeight: 600 }}>{content.maxItems}개</span> 획득 가능</span>
        </div>
      )}

      {/* 등급 범위 */}
      {content.rarityRange && (
        <div style={{ fontSize: 13, color: 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ opacity: 0.7 }}>&#x2B50;</span>
          <span>등급: </span>
          <span style={{ color: RARITY_COLORS[content.rarityRange.min], fontWeight: 600 }}>{content.rarityRange.min}</span>
          {content.rarityRange.min !== content.rarityRange.max && (
            <>
              <span> ~ </span>
              <span style={{ color: RARITY_COLORS[content.rarityRange.max], fontWeight: 600 }}>{content.rarityRange.max}</span>
            </>
          )}
        </div>
      )}

      {/* 추가 정보 (수령 완료, 해금 조건 등) */}
      {content.extra && <div style={{ marginTop: 10, fontSize: 13, color: 'var(--gold)', fontWeight: 600 }}>{content.extra}</div>}
    </div>
  );
}

// ─── Daily Mission Floating Panel (로비 위에 플로팅) ──
function DailyMissionPanel({ missions, completedCount, claimedMissions, claimedMilestones, resetTimer, charClass, onClaimMission, onClaimMilestone, onRerollMission, rerollCount, maxRerolls, rerollingId, setTooltip, collapsed, setCollapsed }) {

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>

            <span style={{ fontFamily: 'Rajdhani', fontSize: 22, fontWeight: 700, letterSpacing: 1.5, color: 'var(--gold)' }}>DAILY MISSION</span>
          </div>

              fontSize: 15, fontFamily: 'Rajdhani', fontWeight: 700, letterSpacing: 0.5,

            {/* 미수령 보상 뱃지 */}

              <span style={{
                minWidth: 22, height: 22, borderRadius: 11, background: '#ef4444',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 700, color: '#fff', fontFamily: 'Rajdhani',

                {totalUnclaimed}

            {/* 접기/펼치기 화살표 */}
            <span style={{
              fontSize: 13, color: 'var(--text-dim)', transition: 'transform 0.3s',

          </div>
        </div>

        {/* ─── 접힘 상태: 요약 정보 ─── */}
        {collapsed && !isClosing && (
          <div style={{ marginTop: 10 }}>
            {allDone ? (

              <div style={{
                display: 'flex', alignItems: 'center', gap: 9, padding: '10px 14px',

                  <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--status-online)' }}>오늘의 미션 완료!</div>

                  onMouseLeave={hideTooltip}
                  style={{
                    flex: 1, padding: '12px 9px', borderRadius: 12,
                    background: claimed ? 'rgba(255,255,255,0.02)' : getBoxBg(msBox),
                    border: claimed ? '1px solid rgba(255,255,255,0.04)' : `1px solid ${getBoxBorder(msBox)}`,
                    cursor: unlocked && !claimed ? 'pointer' : 'default',
                    opacity: claimed ? 0.5 : 1, transition: 'all 0.3s',
                    animation: unlocked && !claimed ? 'glowPulse 2s infinite' : 'none',

                  }}
                >
                  <span style={{ fontSize: 26 }}>{claimed ? '✅' : msBox?.icon}</span>
                  <span style={{ fontSize: 15, fontWeight: 600, color: claimed ? 'var(--text-dim)' : unlocked ? getBoxColor(msBox) : 'var(--text-dim)' }}>{ms.label}</span>
                </button>
              );
            })}
          </div>

          {/* Mission list */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '9px 15px' }} className="scroll-area">
            {missions.map((m, idx) => {
              const done = m.current >= m.target;
              const claimed = claimedMissions.includes(m.id);
              const ti = MISSION_TYPES[m.type] || { icon: '❓', label: '???' };
              const pct = Math.min((m.current / m.target) * 100, 100);
              const box = getRewardBox(m.rewardBoxId);

              const canReroll = !done && !claimed && rerollCount < maxRerolls && !rerollingId;
              const isRerolling = rerollingId === m.id;
              return (
                <div key={m.id} style={{
                  display: 'flex', alignItems: 'stretch', gap: 9, marginBottom: 6,
                  animation: `slideUp 0.3s ease ${idx * 0.06}s backwards`,
                  opacity: claimed ? 0.5 : 1, transition: 'all 0.3s',
                  perspective: '600px',
                }}>
                  {/* 리롤 버튼 (좌측) */}
                  <button
                    onClick={() => canReroll && onRerollMission(m.id)}
                    title={done ? '완료된 미션' : claimed ? '수령 완료' : rerollCount >= maxRerolls ? '리롤 횟수 소진' : '미션 교체'}
                    style={{
                      width: 28, flexShrink: 0, borderRadius: 8,
                      background: 'transparent',
                      border: 'none',
                      cursor: canReroll ? 'pointer' : 'default',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      opacity: done || claimed ? 0 : isRerolling ? 1 : rerollCount >= maxRerolls ? 0.25 : 0.7,
                      transition: 'all 0.2s', fontSize: 15,
                      color: isRerolling ? '#818cf8' : 'var(--text-primary)',
                      pointerEvents: done || claimed ? 'none' : 'auto',
                      animation: isRerolling ? 'rerollIconSpin 0.6s linear infinite' : 'none',
                    }}
                    onMouseEnter={(e) => { if (canReroll) { e.currentTarget.style.opacity = '1'; e.currentTarget.style.color = '#818cf8'; } }}
                    onMouseLeave={(e) => { if (!isRerolling) { e.currentTarget.style.opacity = done || claimed ? '0' : rerollCount >= maxRerolls ? '0.25' : '0.7'; e.currentTarget.style.color = isRerolling ? '#818cf8' : 'var(--text-primary)'; } }}
                  >⟳</button>

                  {/* 미션 정보 (중앙) */}

                    flex: 1, padding: '10px 12px', borderRadius: 10,
                    background: done ? (claimed ? 'rgba(255,255,255,0.015)' : 'rgba(34,197,94,0.05)') : 'rgba(255,255,255,0.02)',
                    border: isRerolling ? '1px solid rgba(99,102,241,0.3)' : done && !claimed ? '1px solid rgba(34,197,94,0.15)' : '1px solid rgba(255,255,255,0.04)',
                    animation: isRerolling ? 'rerollSpin 1s ease-in-out, rerollGlow 1s ease-in-out' : 'none',
                    transformStyle: 'preserve-3d',
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: claimed ? 0 : 6 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 500, color: claimed ? 'var(--text-dim)' : done ? 'var(--text-secondary)' : 'var(--text-primary)', textDecoration: claimed ? 'line-through' : 'none', lineHeight: 1.3 }}>{m.description}</div>
                      </div>
                      {done && <span style={{ color: 'var(--status-online)', fontSize: 13, flexShrink: 0, animation: 'checkPop 0.3s ease' }}>✔</span>}

                    </div>
                    {!claimed && (
                      <div style={{ height: 3, borderRadius: 2, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
                        <div style={{ height: '100%', borderRadius: 2, width: `${pct}%`, background: done ? 'var(--status-online)' : 'linear-gradient(90deg, #60a5fa, var(--gold))', transition: 'width 0.5s ease' }} />
                      </div>
                    )}
                  </div>

                  {/* 보상 상자 (우측 정사각형) */}
                  <button
                    onClick={() => done && !claimed ? onClaimMission(m.id) : null}
                    onMouseEnter={(e) => box && showTooltipFromEvent(e, makeBoxTooltip(box, done && !claimed ? '클릭하여 캐릭터 우편 수령' : null), setTooltip)}
                    onMouseLeave={hideTooltip}
                    style={{
                      width: 56, minHeight: 56, borderRadius: 10, flexShrink: 0,
                      background: claimed ? 'rgba(255,255,255,0.02)' : getBoxBg(box),
                      border: isRerolling ? '1px solid rgba(99,102,241,0.3)' : claimed ? '1px solid rgba(255,255,255,0.04)' : `1px solid ${getBoxBorder(box)}`,
                      cursor: done && !claimed ? 'pointer' : 'default',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      transition: 'all 0.3s',
                      animation: isRerolling ? 'rerollSpin 1s ease-in-out, rerollGlow 1s ease-in-out' : done && !claimed ? 'glowPulse 2s infinite' : 'none',
                      transformStyle: 'preserve-3d',
                    }}
                  >
                    <span style={{ fontSize: 22 }}>{claimed ? '✅' : (box?.icon || '📦')}</span>
                  </button>
                </div>
              );
            })}
          </div>

          {/* 리롤 카운터 */}
          <div style={{
            padding: '8px 15px', display: 'flex', alignItems: 'center', gap: 6,
            borderTop: '1px solid rgba(255,255,255,0.04)',
          }}>
            <span style={{ fontSize: 14, color: (maxRerolls - rerollCount) === 0 ? 'var(--text-dim)' : 'var(--text-secondary)' }}>⟳</span>
            <span style={{ fontSize: 13, color: (maxRerolls - rerollCount) === 0 ? 'var(--text-dim)' : 'var(--text-secondary)', fontFamily: 'Rajdhani', fontWeight: 600 }}>
              {maxRerolls - rerollCount}/{maxRerolls}
            </span>
            <span style={{ fontSize: 12, color: 'var(--text-dim)', marginLeft: 2 }}>
              {(maxRerolls - rerollCount) === 0 ? '리롤 소진' : '미션 교체'}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Reward Popup (보상 개봉 연출 — 다중 아이템) ──────
function RewardPopup({ data, onClose, addToast }) {
  const [phase, setPhase] = useState('opening'); // 'opening' → 'revealed'
  const { boxName, boxIcon, boxColor, items, source } = data;

  useEffect(() => {
    const t = setTimeout(() => setPhase('revealed'), 800);
    return () => clearTimeout(t);
  }, []);

  const handleClaim = () => {
    const summary = items.map(it => `${it.name}${it.count > 1 ? ` x${it.count}` : ''}`).join(', ');
    addToast(`📬 ${summary} — 캐릭터 우편으로 발송됨`, 'success');
    onClose();
  };

  // 최고 등급 아이템 (배경 이펙트용)
  const rarityOrder = ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'];
  const bestItem = items.reduce((best, it) => rarityOrder.indexOf(it.rarity) > rarityOrder.indexOf(best.rarity) ? it : best, items[0]);

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(6px)', zIndex: 6000, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={phase === 'revealed' ? handleClaim : undefined}>
      <div style={{ width: 540, background: 'linear-gradient(135deg, #12121a, #1a1a28)', borderRadius: 24, border: '1px solid rgba(255,255,255,0.1)', overflow: 'hidden', animation: 'popupIn 0.4s ease', textAlign: 'center' }} onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div style={{ padding: '24px 30px 18px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
          <div style={{ fontSize: 16, color: 'var(--text-dim)', marginBottom: 6 }}>{source}</div>
          <div style={{ fontSize: 24, fontFamily: 'Rajdhani', fontWeight: 700, color: boxColor, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9 }}>
            <span>{boxIcon}</span> {boxName}
          </div>
        </div>

        {/* Content */}
        <div style={{ padding: '36px 30px 30px', minHeight: 220, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          {phase === 'opening' ? (
            <div style={{ animation: 'boxOpen 0.8s ease' }}>
              <div style={{ fontSize: 96, marginBottom: 18 }}>{boxIcon}</div>
              <div style={{ fontSize: 20, color: 'var(--text-dim)', animation: 'fadeIn 0.3s ease 0.3s backwards' }}>개봉 중...</div>
            </div>
          ) : (
            <div style={{ width: '100%' }}>
              {/* 아이템 갯수 표시 */}
              <div style={{ fontSize: 14, color: 'var(--text-dim)', marginBottom: 20, fontFamily: 'Rajdhani', fontWeight: 600 }}>
                {items.length}개 아이템 획득
              </div>
              {/* 아이템 그리드 */}
              <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
                {items.map((item, idx) => (
                  <div key={idx} style={{
                    animation: `rewardReveal 0.5s ease ${idx * 0.15}s backwards`,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
                    minWidth: items.length === 1 ? 200 : 140,
                  }}>
                    {/* 아이콘 박스 */}
                    <div style={{
                      width: items.length === 1 ? 100 : 72, height: items.length === 1 ? 100 : 72,
                      borderRadius: 14,
                      background: `${RARITY_COLORS[item.rarity]}12`,
                      border: `2px solid ${RARITY_COLORS[item.rarity]}50`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: items.length === 1 ? 42 : 30,
                      boxShadow: `0 0 20px ${RARITY_COLORS[item.rarity]}25`,
                      position: 'relative',
                    }}>
                      {boxIcon}
                      {/* 수량 뱃지 */}
                      {item.count > 1 && (
                        <span style={{
                          position: 'absolute', bottom: -6, right: -6,
                          background: RARITY_COLORS[item.rarity], color: '#000',
                          fontSize: 13, fontWeight: 800, fontFamily: 'Rajdhani',
                          padding: '1px 7px', borderRadius: 8,
                          boxShadow: `0 2px 8px ${RARITY_COLORS[item.rarity]}40`,
                        }}>x{item.count}</span>
                      )}
                    </div>
                    {/* 이름 */}
                    <div style={{ fontSize: items.length === 1 ? 22 : 16, fontWeight: 700, color: RARITY_COLORS[item.rarity], lineHeight: 1.2 }}>{item.name}</div>
                    {/* 등급 */}
                    <div style={{ fontSize: items.length === 1 ? 15 : 12, color: RARITY_COLORS[item.rarity], opacity: 0.6, fontFamily: 'Rajdhani', fontWeight: 600 }}>{item.rarity}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        {phase === 'revealed' && (
          <div style={{ padding: '18px 30px 24px', borderTop: '1px solid rgba(255,255,255,0.06)', animation: 'fadeIn 0.3s ease 0.2s backwards' }}>
            <button onClick={handleClaim} style={{
              width: '100%', padding: '15px', fontSize: 21, fontWeight: 700, fontFamily: 'Rajdhani', letterSpacing: 1,
              borderRadius: 12, border: '1px solid rgba(212,168,67,0.4)',
              background: 'linear-gradient(135deg, rgba(212,168,67,0.15), rgba(212,168,67,0.08))',
              color: 'var(--gold-bright)', cursor: 'pointer',
            }}>
              확인
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Toast ────────────────────────────────────────────
function Toast({ msg, type }) {
  const bg = { success: 'var(--toast-success)', error: 'var(--toast-error)', info: 'var(--toast-info)', warning: 'var(--toast-warning)' };
  const border = { success: 'rgba(34,197,94,0.3)', error: 'rgba(239,68,68,0.3)', info: 'rgba(59,130,246,0.3)', warning: 'rgba(245,158,11,0.3)' };
  const color = { success: '#4ade80', error: '#f87171', info: '#60a5fa', warning: '#fbbf24' };
  return <div style={{ padding: '15px 24px', borderRadius: 14, background: bg[type], backdropFilter: 'blur(12px)', border: `1px solid ${border[type]}`, color: color[type], fontSize: 20, fontWeight: 500, animation: 'toastIn 0.3s ease', maxWidth: 540, pointerEvents: 'auto' }}>{msg}</div>;
}

// ─── Demo Panel ───────────────────────────────────────
// ─── 미션 완료 플로팅 UI (중앙 하단 미니 툴팁) ──────
// 기획: 3.6 미션 완료 플로팅 UI
// 포맷: 진행 "{Word_DailyMission} - {Objective} {current}/{target}"
//       완료 "{Word_DailyMission} - {Objective} 완료"
// 큐 처리: 여러 알림 순차 표시 (3초 간격)
function MissionFloating({ queue }) {
  if (queue.length === 0) return null;
  const current = queue[0];
  const accentColor = current.isComplete ? 'rgba(34,197,94,' : 'rgba(212,168,67,';
  const textColor = current.isComplete ? '#4ade80' : 'var(--gold-bright)';
  const icon = current.isComplete ? '✅' : '📋';
  return (
    <div key={current.id} style={{
      position: 'fixed', bottom: 200, left: '50%', transform: 'translateX(-50%)',
      background: 'linear-gradient(180deg, rgba(16,16,24,0.94) 0%, rgba(12,12,18,0.96) 100%)',
      border: `1px solid ${accentColor}0.25)`,
      borderRadius: 12, padding: '14px 28px',
      display: 'flex', alignItems: 'center', gap: 12,
      animation: 'floatingIn 0.4s ease',
      zIndex: 9500, pointerEvents: 'none',
      boxShadow: `0 6px 24px rgba(0,0,0,0.5), 0 0 20px ${accentColor}0.08)`,
      backdropFilter: 'blur(16px)',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 8,
        background: `${accentColor}0.12)`, border: `1px solid ${accentColor}0.2)`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 18,
      }}>{icon}</div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 600, color: textColor, letterSpacing: 0.3 }}>
          {current.text}
        </div>
        {current.isComplete && (
          <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>
            📬 보상이 준비되었습니다
          </div>
        )}
      </div>
    </div>
  );
}

function DemoPanel({ collapsed, setCollapsed, missions, completedCount, charClass, setCharClass, progressMission, completeMission, completeAll, resetMissions, claimedMissions, claimedMilestones }) {
  const btnStyle = (c) => ({ padding: '4px 9px', fontSize: 10, fontWeight: 600, borderRadius: 5, border: `1px solid ${c || 'rgba(255,255,255,0.15)'}`, background: `${c || 'rgba(255,255,255,0.04)'}22`, color: c || 'var(--text-secondary)', cursor: 'pointer' });
  return (
    <div style={{ position: 'fixed', top: 72, right: 16, width: collapsed ? 'auto' : 260, background: 'rgba(20,20,30,0.95)', backdropFilter: 'blur(12px)', borderRadius: 10, border: '1px solid rgba(96,165,250,0.2)', zIndex: 8000, overflow: 'hidden', fontSize: 11 }}>
      <div style={{ padding: '6px 10px', background: 'rgba(96,165,250,0.08)', borderBottom: '1px solid rgba(96,165,250,0.15)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }} onClick={() => setCollapsed(!collapsed)}>
        <span style={{ fontFamily: 'Rajdhani', fontWeight: 700, color: '#60a5fa', fontSize: 12 }}>🎮 Demo Panel</span>
        <span style={{ fontSize: 9, color: 'var(--text-dim)' }}>{collapsed ? '◀' : '▶'}</span>
      </div>
      {!collapsed && (
        <div style={{ padding: '8px 10px', maxHeight: 480, overflowY: 'auto' }} className="scroll-area">
          {/* Status */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>상태</div>
            {[['완료', `${completedCount}/5`], ['수령', `${claimedMissions.length}/5`], ['마일스톤', `${claimedMilestones.length}/2`], ['클래스', `${CLASS_ICONS[charClass]} ${charClass}`]].map(([k,v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                <span style={{ color: 'var(--text-dim)' }}>{k}</span>
                <span style={{ color: '#60a5fa', fontFamily: 'Rajdhani', fontWeight: 700 }}>{v}</span>
              </div>
            ))}
          </div>

          {/* Class */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>클래스</div>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {CLASSES.map(c => (
                <button key={c} style={{ ...btnStyle(charClass === c ? CLASS_COLORS[c] : null), fontWeight: charClass === c ? 700 : 400, fontSize: 10 }} onClick={() => setCharClass(c)}>
                  {CLASS_ICONS[c]} {c}
                </button>
              ))}
            </div>
          </div>

          {/* Progress +1 */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>미션 진행 (+1)</div>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {missions.map((m, i) => {
                const done = m.current >= m.target;
                return <button key={m.id} style={btnStyle(done ? '#22c55e' : '#60a5fa')} onClick={() => progressMission(m.id)} disabled={done}>{done ? `✔ ${i+1}` : `${i+1} (${m.current}/${m.target})`}</button>;
              })}
            </div>
          </div>

          {/* Instant complete */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>즉시 완료</div>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {missions.map((m, i) => {
                const done = m.current >= m.target;
                return <button key={m.id} style={btnStyle(done ? '#22c55e' : '#f59e0b')} onClick={() => completeMission(m.id)} disabled={done}>{done ? '✔' : `완료 ${i+1}`}</button>;
              })}
            </div>
          </div>

          {/* Batch */}
          <div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>일괄</div>
            <div style={{ display: 'flex', gap: 4 }}>
              <button style={btnStyle('#22c55e')} onClick={completeAll}>전체 완료</button>
              <button style={btnStyle('#f97316')} onClick={resetMissions}>초기화</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
